<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 36 120" fill="none">
  <!-- MEMORIAL POLE — 3-stage growth system
       Stage 1 (poleProgress < 30): Base carved, upper rough
       Stage 2 (30-70): Two figures carved, wings emerging
       Stage 3 (70+): Full pole with wings, crest, and detail
       CSS classes control visibility per stage -->
  <defs>
    <linearGradient id="mpWood" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6A4C28"/>
      <stop offset="40%" stop-color="#4A3018"/>
      <stop offset="100%" stop-color="#1A1006"/>
    </linearGradient>
    <linearGradient id="mpCarved" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5A3C20"/>
      <stop offset="100%" stop-color="#2A1C0E"/>
    </linearGradient>
  </defs>
  <!-- Main shaft — always visible -->
  <rect x="12" y="8" width="12" height="108" rx="3" fill="url(#mpWood)" stroke="#3A2410" stroke-width="0.8"/>

  <!-- === STAGE 1: Base figure (always visible) === -->
  <g class="mp-stage-1">
    <!-- Bottom figure — ancestor face -->
    <rect x="9" y="82" width="18" height="22" rx="2" fill="url(#mpCarved)" stroke="#3A2410" stroke-width="0.6"/>
    <ellipse cx="15" cy="90" rx="2.5" ry="1.8" fill="#E0D8C8" fill-opacity="0.14"/>
    <ellipse cx="21" cy="90" rx="2.5" ry="1.8" fill="#E0D8C8" fill-opacity="0.14"/>
    <path d="M14 96h8" stroke="#0E0806" stroke-width="1.2" stroke-linecap="round"/>
    <path d="M14 86c2-2 4-3 4-3 1 0 3 1 4 3" stroke="#4A3018" stroke-width="0.6" fill="none"/>
    <!-- Rough chisel marks on upper shaft (uncarved) -->
    <line x1="14" y1="30" x2="22" y2="30" stroke="#5A3C20" stroke-width="0.5" opacity="0.3"/>
    <line x1="14" y1="40" x2="22" y2="40" stroke="#5A3C20" stroke-width="0.5" opacity="0.3"/>
    <line x1="14" y1="50" x2="22" y2="50" stroke="#5A3C20" stroke-width="0.5" opacity="0.3"/>
    <line x1="14" y1="60" x2="22" y2="60" stroke="#5A3C20" stroke-width="0.5" opacity="0.3"/>
  </g>

  <!-- === STAGE 2: Mid figure (visible at progress >= 30) === -->
  <g class="mp-stage-2" opacity="0">
    <!-- Middle figure — warrior/canoe figure -->
    <rect x="10" y="54" width="16" height="20" rx="1.5" fill="url(#mpCarved)" stroke="#3A2410" stroke-width="0.5"/>
    <ellipse cx="15" cy="61" rx="2" ry="1.4" fill="#E0D8C8" fill-opacity="0.12"/>
    <ellipse cx="21" cy="61" rx="2" ry="1.4" fill="#E0D8C8" fill-opacity="0.12"/>
    <path d="M14 66h8" stroke="#0E0806" stroke-width="1" stroke-linecap="round"/>
    <!-- Small wing stubs emerging -->
    <path d="M10 58c-2-1-4 0-5 2 2 1 4 1 5-1Z" fill="#4A3018" opacity="0.6"/>
    <path d="M26 58c2-1 4 0 5 2-2 1-4 1-5-1Z" fill="#4A3018" opacity="0.6"/>
  </g>

  <!-- === STAGE 3: Top crest (visible at progress >= 70) === -->
  <g class="mp-stage-3" opacity="0">
    <!-- Top figure — chief/eagle crest -->
    <rect x="10" y="22" width="16" height="24" rx="2" fill="url(#mpCarved)" stroke="#3A2410" stroke-width="0.6"/>
    <ellipse cx="15" cy="30" rx="2.2" ry="1.6" fill="#E0D8C8" fill-opacity="0.15"/>
    <ellipse cx="21" cy="30" rx="2.2" ry="1.6" fill="#E0D8C8" fill-opacity="0.15"/>
    <path d="M14 36h8" stroke="#0E0806" stroke-width="1.2" stroke-linecap="round"/>
    <path d="M14 27c2-2 4-3 4-3 1 0 3 1 4 3" stroke="#D4B020" stroke-opacity="0.18" stroke-width="0.7" fill="none"/>
    <!-- Full wings — sweeping -->
    <path d="M10 28c-3-2-6-1-8 1-1 2 0 4 2 5 2 0 4-1 5-3Z" fill="#3A2410"/>
    <path d="M26 28c3-2 6-1 8 1 1 2 0 4-2 5-2 0-4-1-5-3Z" fill="#3A2410"/>
    <!-- Wing detail feathers -->
    <line x1="5" y1="30" x2="8" y2="29" stroke="#5A3818" stroke-width="0.4" opacity="0.5"/>
    <line x1="4" y1="32" x2="7" y2="31" stroke="#5A3818" stroke-width="0.4" opacity="0.5"/>
    <line x1="28" y1="29" x2="31" y2="30" stroke="#5A3818" stroke-width="0.4" opacity="0.5"/>
    <line x1="29" y1="31" x2="32" y2="32" stroke="#5A3818" stroke-width="0.4" opacity="0.5"/>
    <!-- Crown / crest peak -->
    <path d="M14 18L18 8 22 18" fill="#4A3018" stroke="#3A2410" stroke-width="0.5"/>
    <circle cx="18" cy="12" r="1.5" fill="#D4B020" fill-opacity="0.2"/>
    <!-- Gold accents when fully carved -->
    <line x1="12" y1="42" x2="24" y2="42" stroke="#D4B020" stroke-opacity="0.15" stroke-width="1"/>
    <line x1="12" y1="76" x2="24" y2="76" stroke="#D4B020" stroke-opacity="0.12" stroke-width="0.8"/>
  </g>

  <!-- Base — always visible -->
  <rect x="8" y="108" width="20" height="10" rx="2" fill="#1A1006" stroke="#0E0806" stroke-width="0.6"/>
  <!-- Ground shadow -->
  <ellipse cx="18" cy="118" rx="14" ry="2" fill="#080608" fill-opacity="0.25"/>
</svg>
