<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 14 72" fill="none">
  <defs>
    <linearGradient id="staffShaft" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8A6838"/>
      <stop offset="50%" stop-color="#6A4C28"/>
      <stop offset="100%" stop-color="#3A2814"/>
    </linearGradient>
  </defs>
  <!-- Main shaft — straight cedar, polished -->
  <rect x="5.5" y="10" width="3" height="60" rx="1.5" fill="url(#staffShaft)"/>
  <!-- Top carved piece — speaking figure -->
  <path d="M3 0c2 3 4 5 4 8 0 2-1 3-1 3h2c0 0-1-1-1-3 0-3 2-5 4-8-2 1-4 2-4 2l-2-2h-2Z" fill="#5A3818"/>
  <ellipse cx="7" cy="8" rx="3.5" ry="3" fill="#4A2C18"/>
  <!-- Eyes — formline ovals -->
  <ellipse cx="5.5" cy="7.5" rx="1.2" ry="0.8" fill="#E0D8C8" fill-opacity="0.18"/>
  <ellipse cx="8.5" cy="7.5" rx="1.2" ry="0.8" fill="#E0D8C8" fill-opacity="0.18"/>
  <!-- Mouth — speaking -->
  <path d="M5 10h4" stroke="#E0D8C8" stroke-opacity="0.12" stroke-width="0.7" stroke-linecap="round"/>
  <!-- Cedar bark streamers — two strips hanging -->
  <path d="M5 14c-2 6-3 14-2 22" stroke="#7A5828" stroke-width="1.2" stroke-linecap="round" fill="none" opacity="0.7"/>
  <path d="M9 14c2 5 2 12 1 20" stroke="#6A4820" stroke-width="1" stroke-linecap="round" fill="none" opacity="0.6"/>
  <!-- Peace tokens tied along shaft -->
  <circle cx="4" cy="24" r="1.5" fill="#D4B020" fill-opacity="0.25"/>
  <circle cx="10" cy="32" r="1.2" fill="#D4B020" fill-opacity="0.2"/>
  <circle cx="4" cy="42" r="1" fill="#C8A870" fill-opacity="0.18"/>
  <!-- Binding wraps -->
  <rect x="5" y="18" width="4" height="2" rx="0.5" fill="#5A3818" opacity="0.6"/>
  <rect x="5" y="50" width="4" height="2" rx="0.5" fill="#4A2C18" opacity="0.5"/>
  <!-- Base point — planted in ground -->
  <path d="M5.5 68L7 72 8.5 68" fill="#3A2814"/>
</svg>
