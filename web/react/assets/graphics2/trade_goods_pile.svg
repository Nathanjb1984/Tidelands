<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 40" fill="none">
  <defs>
    <linearGradient id="tgBox1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7A5830"/>
      <stop offset="100%" stop-color="#4A3018"/>
    </linearGradient>
    <linearGradient id="tgBox2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6A4C28"/>
      <stop offset="100%" stop-color="#3A2414"/>
    </linearGradient>
    <linearGradient id="tgOil" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5A4428"/>
      <stop offset="100%" stop-color="#302014"/>
    </linearGradient>
    <linearGradient id="tgBark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6A4020"/>
      <stop offset="100%" stop-color="#3A2010"/>
    </linearGradient>
  </defs>
  <!-- Ground / mat -->
  <ellipse cx="48" cy="36" rx="44" ry="4" fill="#1A1408" fill-opacity="0.4"/>
  <!-- Bentwood box — large, with formline -->
  <rect x="4" y="14" width="20" height="18" rx="2" fill="url(#tgBox1)" stroke="#5A3818" stroke-width="0.8"/>
  <path d="M8 18c3-2 6-3 8-2 3 1 4 3 4 6-2 0-5 1-8 0-3 0-5-2-4-4Z" fill="#D4B020" fill-opacity="0.08"/>
  <line x1="14" y1="16" x2="14" y2="30" stroke="#5A3818" stroke-width="0.5" opacity="0.4"/>
  <!-- Bentwood box — smaller -->
  <rect x="26" y="18" width="14" height="14" rx="1.5" fill="url(#tgBox2)" stroke="#4A2C14" stroke-width="0.6"/>
  <line x1="33" y1="19" x2="33" y2="31" stroke="#4A2C14" stroke-width="0.4" opacity="0.4"/>
  <!-- Oil container — round with lid -->
  <ellipse cx="50" cy="26" rx="7" ry="8" fill="url(#tgOil)" stroke="#3A2010" stroke-width="0.6"/>
  <ellipse cx="50" cy="20" rx="5.5" ry="2.5" fill="#4A3420" stroke="#3A2010" stroke-width="0.5"/>
  <!-- Cedar bark bundles — tied -->
  <rect x="60" y="20" width="10" height="14" rx="2" fill="url(#tgBark)" stroke="#4A2818" stroke-width="0.5"/>
  <line x1="62" y1="22" x2="62" y2="32" stroke="#5A3818" stroke-width="0.4" opacity="0.5"/>
  <line x1="65" y1="21" x2="65" y2="33" stroke="#5A3818" stroke-width="0.4" opacity="0.5"/>
  <line x1="68" y1="22" x2="68" y2="32" stroke="#5A3818" stroke-width="0.4" opacity="0.5"/>
  <path d="M59 26h12" stroke="#7A5830" stroke-width="1" stroke-linecap="round" opacity="0.6"/>
  <!-- Copper pieces -->
  <rect x="74" y="22" width="5" height="10" rx="0.5" fill="#C87830" fill-opacity="0.65"/>
  <rect x="80" y="24" width="4" height="8" rx="0.5" fill="#B86820" fill-opacity="0.55"/>
  <!-- Dentalium shell strings -->
  <path d="M86 22c2 4 3 8 3 12" stroke="#E8E0D0" stroke-width="1.2" stroke-linecap="round" opacity="0.45"/>
  <path d="M89 24c1 3 2 7 2 10" stroke="#D8D0C0" stroke-width="1" stroke-linecap="round" opacity="0.35"/>
  <!-- Woven blanket draped across -->
  <path d="M28 12c8-3 18-3 26 0 0 3-3 5-8 6-4 1-8 1-12 0-5-1-7-3-6-6Z" fill="#5A3020" fill-opacity="0.45"/>
  <line x1="34" y1="10" x2="34" y2="17" stroke="#4A2818" stroke-width="0.3" opacity="0.4"/>
  <line x1="40" y1="10" x2="40" y2="17" stroke="#4A2818" stroke-width="0.3" opacity="0.4"/>
  <line x1="46" y1="10" x2="46" y2="17" stroke="#4A2818" stroke-width="0.3" opacity="0.4"/>
</svg>
