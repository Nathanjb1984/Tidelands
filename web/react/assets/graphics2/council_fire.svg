<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 52" fill="none">
  <defs>
    <linearGradient id="cfFlame1" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#C84020"/>
      <stop offset="50%" stop-color="#E8A020"/>
      <stop offset="100%" stop-color="#F0C840"/>
    </linearGradient>
    <linearGradient id="cfFlame2" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#A03018"/>
      <stop offset="60%" stop-color="#D88028"/>
      <stop offset="100%" stop-color="#E8B040"/>
    </linearGradient>
    <radialGradient id="cfGlow" cx="50%" cy="60%" r="50%">
      <stop offset="0%" stop-color="#E8A040" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#E8A040" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Fire pit — ring of stones -->
  <ellipse cx="32" cy="42" rx="18" ry="6" fill="#2A2018"/>
  <ellipse cx="20" cy="41" rx="3.5" ry="2.5" fill="#3A3028" stroke="#4A4038" stroke-width="0.5"/>
  <ellipse cx="28" cy="44" rx="3" ry="2" fill="#38302A" stroke="#484038" stroke-width="0.4"/>
  <ellipse cx="36" cy="44" rx="3.2" ry="2.2" fill="#3A302A" stroke="#484038" stroke-width="0.4"/>
  <ellipse cx="44" cy="41" rx="3.5" ry="2.5" fill="#3A3028" stroke="#4A4038" stroke-width="0.5"/>
  <!-- Logs crossing -->
  <line x1="22" y1="40" x2="42" y2="40" stroke="#3A2010" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="26" y1="38" x2="38" y2="43" stroke="#2A1808" stroke-width="2" stroke-linecap="round"/>
  <!-- Main flames — three layers -->
  <path d="M26 38c-2-6 0-14 4-20 2 4 3 8 2 12 2-3 4-8 4-14 3 5 4 12 2 18 1-2 3-6 3-10 1 4 0 10-3 14-2 3-5 4-8 3-3-1-4-2-4-3Z" fill="url(#cfFlame1)" opacity="0.8"/>
  <path d="M28 38c-1-5 1-10 3-16 2 3 2 7 1 10 1-2 3-6 3-10 2 4 3 10 1 14-1 2-3 3-5 3-2-1-3-1-3-1Z" fill="url(#cfFlame2)" opacity="0.65"/>
  <path d="M30 38c0-4 1-8 2-12 1 3 1 6 0 8 1-1 2-4 2-7 1 3 2 7 1 10-1 1-2 2-3 2-1 0-2-1-2-1Z" fill="#F0C840" opacity="0.5"/>
  <!-- Sparks -->
  <circle cx="28" cy="18" r="0.8" fill="#F0C840" opacity="0.6"/>
  <circle cx="36" cy="14" r="0.6" fill="#E8A030" opacity="0.5"/>
  <circle cx="30" cy="22" r="0.5" fill="#F0D050" opacity="0.4"/>
  <!-- Embers at base -->
  <circle cx="26" cy="40" r="1.2" fill="#E86020" fill-opacity="0.4"/>
  <circle cx="34" cy="41" r="1" fill="#D04818" fill-opacity="0.35"/>
  <circle cx="38" cy="40" r="0.8" fill="#E86020" fill-opacity="0.3"/>
  <!-- Smoke wisps -->
  <path d="M30 8c-1-3 0-5 1-7" stroke="#8080A0" stroke-width="0.8" stroke-linecap="round" opacity="0.12"/>
  <path d="M34 6c0-3 1-5 0-7" stroke="#8080A0" stroke-width="0.6" stroke-linecap="round" opacity="0.1"/>
  <!-- Ambient glow -->
  <ellipse cx="32" cy="36" rx="24" ry="14" fill="url(#cfGlow)"/>
  <!-- Log seats on either side -->
  <rect x="4" y="38" width="12" height="4" rx="2" fill="#2A1808" stroke="#1A1006" stroke-width="0.5"/>
  <rect x="48" y="38" width="12" height="4" rx="2" fill="#2A1808" stroke="#1A1006" stroke-width="0.5"/>
</svg>
