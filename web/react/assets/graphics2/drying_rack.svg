<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 56 64" fill="none">
  <defs>
    <linearGradient id="drPole" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4A2C18"/>
      <stop offset="100%" stop-color="#2A1408"/>
    </linearGradient>
    <linearGradient id="drFishBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6A5040"/>
      <stop offset="100%" stop-color="#3A2010"/>
    </linearGradient>
  </defs>
  <!-- Support poles -->
  <rect x="8" y="6" width="3" height="58" rx="1" fill="url(#drPole)"/>
  <rect x="45" y="6" width="3" height="58" rx="1" fill="url(#drPole)"/>
  <!-- Crossbar -->
  <rect x="6" y="6" width="44" height="3.5" rx="1" fill="#4A2C18" stroke="#321808" stroke-width="0.6"/>
  <!-- Hanging ties — cedar bark strips -->
  <line x1="14" y1="9" x2="14" y2="16" stroke="#5A381E" stroke-width="0.8"/>
  <line x1="22" y1="9" x2="22" y2="15" stroke="#5A381E" stroke-width="0.8"/>
  <line x1="30" y1="9" x2="30" y2="16" stroke="#5A381E" stroke-width="0.8"/>
  <line x1="38" y1="9" x2="38" y2="15" stroke="#5A381E" stroke-width="0.8"/>
  <!-- Fish row 1 — hanging salmon -->
  <path d="M11 16c2 0 4 1 5 3 1-2 0-3-1-4l3 0c-1 1-2 2-2 4 2-1 4-2 6-2" fill="url(#drFishBody)" opacity="0.85"/>
  <circle cx="12" cy="17.5" r="0.6" fill="#E0D8C8" fill-opacity="0.2"/>
  <path d="M19 16c2 0 4 1 5 3 1-2 0-3-1-4l3 0c-1 1-2 2-2 4 2-1 4-2 6-2" fill="url(#drFishBody)" opacity="0.8"/>
  <circle cx="20" cy="17.5" r="0.6" fill="#E0D8C8" fill-opacity="0.2"/>
  <path d="M27 16c2 0 4 1 5 3 1-2 0-3-1-4l3 0c-1 1-2 2-2 4 2-1 4-2 6-2" fill="url(#drFishBody)" opacity="0.85"/>
  <circle cx="28" cy="17.5" r="0.6" fill="#E0D8C8" fill-opacity="0.2"/>
  <path d="M35 16c2 0 4 1 5 3 1-2 0-3-1-4l3 0c-1 1-2 2-2 4 2-1 4-2 6-2" fill="url(#drFishBody)" opacity="0.78"/>
  <circle cx="36" cy="17.5" r="0.6" fill="#E0D8C8" fill-opacity="0.2"/>
  <!-- Fish row 2 — lower set, staggered -->
  <path d="M14 26c2 0 4 1 5 3 1-2 0-3-1-4l3 0c-1 1-2 2-2 4 2-1 4-2 6-2" fill="url(#drFishBody)" opacity="0.75"/>
  <path d="M26 27c2 0 4 1 5 3 1-2 0-3-1-4l3 0c-1 1-2 2-2 4 2-1 4-2 6-2" fill="url(#drFishBody)" opacity="0.72"/>
  <!-- Drip lines — subtle drying effect -->
  <line x1="16" y1="22" x2="16" y2="25" stroke="#5A4A38" stroke-opacity="0.15" stroke-width="0.5"/>
  <line x1="24" y1="21" x2="24" y2="24" stroke="#5A4A38" stroke-opacity="0.15" stroke-width="0.5"/>
  <line x1="32" y1="22" x2="32" y2="25" stroke="#5A4A38" stroke-opacity="0.15" stroke-width="0.5"/>
  <line x1="40" y1="21" x2="40" y2="24" stroke="#5A4A38" stroke-opacity="0.15" stroke-width="0.5"/>
  <!-- Fish row 3 — further dried, lighter opacity -->
  <path d="M11 36c2 0 4 1 5 3 1-2 0-3-1-4l3 0c-1 1-2 2-2 4 2-1 4-2 6-2" fill="url(#drFishBody)" opacity="0.6"/>
  <path d="M19 37c2 0 4 1 5 3 1-2 0-3-1-4l3 0c-1 1-2 2-2 4 2-1 4-2 6-2" fill="url(#drFishBody)" opacity="0.58"/>
  <path d="M27 36c2 0 4 1 5 3 1-2 0-3-1-4l3 0c-1 1-2 2-2 4 2-1 4-2 6-2" fill="url(#drFishBody)" opacity="0.62"/>
  <path d="M35 37c2 0 4 1 5 3 1-2 0-3-1-4l3 0c-1 1-2 2-2 4 2-1 4-2 6-2" fill="url(#drFishBody)" opacity="0.55"/>
  <!-- Ground detail — shore pebbles -->
  <ellipse cx="12" cy="62" rx="3" ry="1.2" fill="#3A2C1E" fill-opacity="0.3"/>
  <ellipse cx="28" cy="63" rx="4" ry="1.5" fill="#3A2C1E" fill-opacity="0.25"/>
  <ellipse cx="44" cy="62" rx="3" ry="1" fill="#3A2C1E" fill-opacity="0.3"/>
</svg>
