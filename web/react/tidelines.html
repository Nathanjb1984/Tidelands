function routeIdxForState(s,phase=phaseIdx(s?.step||'')){
  const step=s?.step||'';
  if(step.startsWith('aft')) return 5;
  if(step.startsWith('wth')) return 4;
  if(step.startsWith('enc')||step.startsWith('res')) return 3;
  if(step==='trv_arrival'||step==='trv_form'||step==='trv_done') return 3;
  if(step==='trv_trade_negotiate'||step==='trv_diplo_council') return 3;
  if(step==='trv_event'||step==='trv_trade_event'||step==='trv_diplo_event') return 2;
  if(step==='trv_route') return 1;
  return PHASE_ROUTE_INDEX[phase]??0;
}
function routeNodeForState(s,phase=phaseIdx(s?.step||'')){

function getLocationIdentity(phase){
  const key=phaseLocationKey(phase);
  if(key==='home'||key==='homecoming') return WORLD.home;
  if(key==='cedar') return WORLD.target;
  const node=WORLD.route.find(r=>r.key===key)||WORLD.route[0];
  return{
    key:node.key,
    name:node.label,
    title:node.sub,
    badge:node.water==='channel'?'Channel Water':node.water==='open'?'Outer Reach':node.water==='return'?'Homeward Arc':'Coastal Route',
    subtitle:node.landmark,
    atmosphere:node.water==='open'
      ?'The canoe is exposed between settlements; distance feels real here.'
      :node.water==='channel'
      ?'Currents gather and separate villages. Water chooses the pace.'
      :'The shoreline bends; the route itself becomes part of the story.',
    tone:node.water,
  };
}
function campaignSeason(s){
  if(s.feudEscalation>12) return 'Season of Blood Water';
  if(s.totalRaids>=5&&s.prestige>=260) return 'Season of Witnessed Prestige';
  if(s.totalRaids>=3) return 'Season of Hard Crossings';
  if(s.totalRaids>=1) return 'Season of Retaliation';
  return 'First Season of Answering';
}
function getLocationIdentityForState(s,phase){
  const idx=routeIdxForState(s,phase);
  if(idx===0) return WORLD.home;
  if(idx===3) return WORLD.target;
  if(idx===5) return {...WORLD.home,name:'Stoneshell Inlet',title:'Homecoming',badge:'Witness Beach',tone:'homecoming'};
  const node=WORLD.route[idx]||WORLD.route[0];
  return{
    key:node.key,

function seasonNumber(s){return (s.totalRaids||0)+1;}
function coastMemoryLine(s){
  if(!s.lastRun) return 'The wider coast is still listening for the shape of your first crossing.';
  if(s.lastRun.named_dead?.length) return `The coast still holds the names of ${s.lastRun.named_dead.join(', ')}.`;
  if(s.lastRun.outcome==='DECISIVE_VICTORY') return 'Cedar Creek remembers the day your canoe owned its beach.';
  if(s.lastRun.outcome==='VICTORY') return 'Other shorelines have begun to weigh your name more carefully.';
  if(s.lastRun.outcome==='STALEMATE') return 'Both villages remember a crossing that proved nothing and changed everything.';
  if(s.lastRun.outcome==='DEFEAT'||s.lastRun.outcome==='DEVASTATING_DEFEAT') return 'The route home still feels longer after the last retreat.';
  return 'The channels are learning your rhythm.';
}
function routeStatusText(phase,s){
  const idx=routeIdxForState(s,phase);
  if(idx===1) return 'Leaving home water - Seal Narrows ahead';
  if(idx===2) return 'In Grey Channel - exposed crossing';
  if(idx===3) return `At ${WORLD.target.name} - ${feudName(s.feudEscalation)}`;
  if(idx===4) return s.outcome.includes('VICTORY')?'Turning south with spoils and wounded':'Turning south with grief and silence';
  if(idx===5) return 'Back inside Stoneshell Inlet - witnesses on the beach';
  if(phase===0) return 'War canoe beached in home water';
  if(phase===1) return 'Two waters from home · exposed crossing';
  if(phase===2||phase===3) return `At ${WORLD.target.name} · ${feudName(s.feudEscalation)}`;
  if(phase===4) return s.outcome.includes('VICTORY')?'Homeward with spoils and wounded':'Homeward carrying grief and silence';
  return 'Back inside Stoneshell Inlet · witnesses on the beach';
}

function logAlphaEvent(type,payload={}){
  try{
    const raw=localStorage.getItem(ALPHA_LOG_KEY);
    const prev=raw?JSON.parse(raw):[];
    const next=[...prev.slice(-19),{type,ts:new Date().toISOString(),...payload}];
    localStorage.setItem(ALPHA_LOG_KEY,JSON.stringify(next));
  }catch(e){}
}

  if(s.surpriseBonus>=20) f.push(s.approachTime+' approach');
  else if(s.surpriseBonus>=10) f.push('good timing');
  if(s.prestige>=300) f.push('fearsome reputation');
  if(f.length===0) return '';
  if(s.intimDelta>=15) return 'Your advantages carried weight: '+f.join(', ')+'.';
  if(s.intimDelta>=1) return 'A slight edge from '+f.join(', ')+' — but Cedar Creek held firm.';
  return 'Despite '+f.join(', ')+' — Cedar Creek stood resolute.';
}
function buildBattleExplain(s){
  const f=[];
  if(s.surpriseBonus>15) f.push('strong surprise');
  if(s.morale>=70) f.push('high morale');
  if(s.morale<40) f.push('wavering morale');
  const tm=TACTIC_MODS[s.attackerTactic]||{};
  if(tm.atk>=1.3) f.push('overwhelming aggression');
  else if(tm.atk<=0.5) f.push('cautious restraint');
  if(s.crewAlive>s.defender.crewSize+3) f.push('numerical advantage');
  const rW=s.rounds.filter(r=>r.winner==='atk').length;
  if(rW>=3) f.push('dominance in every round');
  else if(rW===0) f.push('no round won');
  if(f.length===0) return '';
  const isW=s.outcome.includes('VICTORY');
  return (isW?'Decisive factors: ':'The tide turned on: ')+f.join(', ')+'.';
}
function buildCasualtyExplain(s){
  const tm=TACTIC_MODS[s.attackerTactic]||{};
  if(s.crewKilled===0&&s.crewWounded===0) return 'Your crew emerged unscathed — skill and fortune both.';
  const parts=[];
  if(tm.loss>=1.5) parts.push('the ferocity of your own assault');
  if(s.outcome==='DEVASTATING_DEFEAT') parts.push('the collapse of your line');
  else if(s.outcome==='DEFEAT') parts.push('a losing position');
  if(s.crewKilled>=2) parts.push('close fighting on the gravel');
  if(parts.length===0) return '';
  return 'Losses driven by '+parts.join(' and ')+'.';
}

/* ─── §5  Persistence  (UNCHANGED) ───────────────────────────────────── */
const SAVE_KEY='tidelines_save_v1';
function loadPersist(){try{const r=localStorage.getItem(SAVE_KEY);return r?JSON.parse(r):null;}catch(e){return null;}}
function savePersist(d){try{localStorage.setItem(SAVE_KEY,JSON.stringify(d));}catch(e){}}
function clearPersist(){try{localStorage.removeItem(SAVE_KEY);}catch(e){}}
function persistFromState(s){return{prestige:s.prestige,feudEscalation:s.feudEscalation,legacyEntries:s.legacyEntries,warTraits:s.warTraits,totalRaids:s.totalRaids,lastRun:s.lastRun,foodStores:s.foodStores,villageReadiness:s.villageReadiness,canoeReadiness:s.canoeReadiness,poleProgress:s.poleProgress};}

function buildNextSeasonCarry(s){
  const carry=persistFromState(s);
  const effects=[];
  let startMorale=65,startCanoeCondition=100,crewQuality=55,startIntimidationBonus=0;
  const food=carry.foodStores??72,village=carry.villageReadiness??58,canoe=carry.canoeReadiness??60,pole=carry.poleProgress??12,feud=carry.feudEscalation??8;

  if(food<30){startMorale-=12;crewQuality-=5;effects.push('Winter starts hungry: thin stores lower morale and leave the crew less ready.');}
  else if(food<45){startMorale-=6;crewQuality-=2;effects.push('Food stores are tight. The next crew starts with a little less strength.');}
  else if(food>80){startMorale+=6;crewQuality+=2;effects.push('Full smoke racks carry into the new season: morale and crew quality rise.');}

  if(village<35){startMorale-=8;effects.push('The village is strained. Repairs, grieving, and winter work slow every preparation.');}
  else if(village>75){startMorale+=4;effects.push('A strong village gives the new season a calmer, steadier start.');}

  if(canoe<35){startCanoeCondition-=18;effects.push('The war canoe was neglected. It launches with old scrapes and tired lashings.');}
  else if(canoe<50){startCanoeCondition-=8;effects.push('The canoe needs work. The next crossing begins with a weakened hull.');}
  else if(canoe>80){startCanoeCondition+=5;effects.push('Careful canoe work pays off. The hull starts the season in excellent condition.');}

  if(feud>12){startMorale-=4;effects.push('Cedar Creek arms for retaliation. The next raid will meet a harder shore.');}
  else if(feud<=3){startMorale+=4;effects.push('The feud has cooled. People sleep easier, and the crew feels it.');}

  if(pole>=70){startIntimidationBonus+=8;effects.push('The memorial pole now speaks before you arrive: your lineage carries visible authority.');}
  else if(pole>=40){startIntimidationBonus+=4;effects.push('The growing pole strengthens your reputation along the coast.');}

  if(s.lastRun?.outcome==='DECISIVE_VICTORY'){startMorale+=6;crewQuality+=3;effects.push("Last season's decisive victory becomes confidence at the paddles.");}
  else if(s.lastRun?.outcome==='VICTORY'){startMorale+=3;effects.push('Victory carries forward. The crew begins with remembered courage.');}
  else if(s.lastRun?.outcome==='DEFEAT'||s.lastRun?.outcome==='DEVASTATING_DEFEAT'){startMorale-=8;effects.push('Defeat follows the canoe home. The next season begins under grief and doubt.');}
  else if(s.lastRun?.outcome==='TRADE_SUCCESS'){startMorale+=4;effects.push('Trade goods bought comfort and goodwill. The village starts warmer.');}
  else if(s.lastRun?.outcome==='DIPLOMACY_SUCCESS'){startMorale+=5;effects.push('Peace talk lowers the breath in every room. The new season starts steadier.');}

  return{
    ...carry,
    startMorale:cl(startMorale,25,90),
    startCanoeCondition:cl(startCanoeCondition,35,100),
    crewQuality:cl(crewQuality,35,75),
    startIntimidationBonus,
    seasonEffects:effects,
  };
}

/* ═══════════════════════════════════════════════════════════════════════
   §5.5  AUDIO ENGINE — Web Audio API synth, fully self-contained
   ═══════════════════════════════════════════════════════════════════════
   Lightweight procedural audio. No samples, no external files.
   All sounds are tiny Web Audio API oscillator / noise bursts.
   ═══════════════════════════════════════════════════════════════════════ */
const AUDIO_PREF_KEY='tidelines_audio_v1';
const TL_Audio=(()=>{
  let ctx=null,masterGain=null,muted=false;
  /* Restore preference */
  try{muted=localStorage.getItem(AUDIO_PREF_KEY)==='muted';}catch(e){}

  function ensureCtx(){
    if(ctx&&ctx.state!=='closed')return ctx;
    try{ctx=new(window.AudioContext||window.webkitAudioContext)();
      masterGain=ctx.createGain();masterGain.gain.value=muted?0:0.35;masterGain.connect(ctx.destination);
    }catch(e){ctx=null;}
    return ctx;
  }
  function resume(){if(ctx&&ctx.state==='suspended')ctx.resume().catch(()=>{});}
  function setMute(m){muted=m;try{localStorage.setItem(AUDIO_PREF_KEY,m?'muted':'on');}catch(e){}
    if(masterGain)masterGain.gain.setTargetAtTime(m?0:0.35,ctx.currentTime,0.05);}
  function isMuted(){return muted;}

  /* ── Primitives ── */
  function osc(freq,type,dur,vol=0.3,delay=0){
    const c=ensureCtx();if(!c)return;resume();const t=c.currentTime+delay;
    const o=c.createOscillator();const g=c.createGain();
    o.type=type;o.frequency.setValueAtTime(freq,t);
    g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(vol,t+0.01);
    g.gain.setTargetAtTime(0,t+dur*0.6,dur*0.25);
    o.connect(g);g.connect(masterGain);o.start(t);o.stop(t+dur+0.1);
  }
  function noise(dur,vol=0.08,delay=0){
    const c=ensureCtx();if(!c)return;resume();const t=c.currentTime+delay;
    const len=c.sampleRate*dur;const buf=c.createBuffer(1,len,c.sampleRate);
    const d=buf.getChannelData(0);for(let i=0;i<len;i++)d[i]=(Math.random()*2-1);
    const src=c.createBufferSource();src.buffer=buf;
    const g=c.createGain();g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(vol,t+0.01);
    g.gain.setTargetAtTime(0,t+dur*0.5,dur*0.3);
    const filt=c.createBiquadFilter();filt.type='lowpass';filt.frequency.value=800;
    src.connect(filt);filt.connect(g);g.connect(masterGain);src.start(t);src.stop(t+dur+0.1);
  }

  /* ── UI SFX ── */
  function sfxClick(){osc(520,'sine',0.06,0.15);osc(780,'sine',0.04,0.08,0.02);}

    osc(100,'square',0.3,0.08,0.2);noise(0.5,0.08,0.1);
    osc(200,'triangle',0.2,0.1,0.35);
  }
  function cueWithdrawal(){osc(200,'sine',0.5,0.08);osc(150,'sine',0.6,0.06,0.25);noise(0.5,0.02,0.2);}

  /* ── Battle feedback ── */

/* ─── §6  Deep-dup ───────────────────────────────────────────────────── */
function dup(s){
  return{...s,log:[...s.log],defender:{...s.defender},
    namedCrew:s.namedCrew.map(c=>({...c})),
    rounds:s.rounds.map(r=>({...r,event:r.event?{...r.event}:null})),
    spoils:[...s.spoils],traitsEarned:[...s.traitsEarned],
    legacyEntries:[...s.legacyEntries],warTraits:[...s.warTraits],
    lastRun:s.lastRun?{...s.lastRun}:null,
    statDeltas:{...s.statDeltas},
    tradeEventId:s.tradeEventId,diploEventId:s.diploEventId};
}

/* ─── §7  Engine  (UNCHANGED — pure math) ─────────────────────────────── */
function calcIntimidation(s){
  let sc=0;sc+=14;sc+=12;sc+=8;sc+=7;
  sc+=Math.min(Math.floor(s.prestige/100),10);sc+=5;sc+=s.intimidationBonus;return sc;
}
function calcResolve(d){
  let sc=0;sc+=Math.max(20,Math.min(d.communitySize,60));
  sc+=Math.min(d.leadership,15);sc+=Math.min(d.alliance,15);sc+=Math.min(d.fortification*5,15);return sc;
}
function doIntimidation(s){
  s.intimScore=calcIntimidation(s);s.resolveScore=calcResolve(s.defender);
  s.intimDelta=s.intimScore-s.resolveScore;
  if(s.intimDelta>=50){s.intimResult='OVERWHELMING';s.defenderFled=true;s.defender.morale-=30;}
  else if(s.intimDelta>=30){s.intimResult='DOMINANT';s.defender.morale-=20;}
  else if(s.intimDelta>=15){s.intimResult='STRONG';s.defender.morale-=ri(15,25);}
  else if(s.intimDelta>=1){s.intimResult='SLIGHT';s.defender.morale-=ri(5,10);}
  else if(s.intimDelta<=-15){s.intimResult='REVERSED';s.morale-=ri(5,15);}
  else{s.intimResult='NEUTRAL';}
  s.defender.morale=cl(s.defender.morale,5,100);s.morale=cl(s.morale,5,100);
}
function roundScore(f,type,isAtk,tacMod){
  let sc=0;const m=f.morale||50,q=f.quality||f.crewQuality||50,sz=f.crewSize||10,
    cc=f.canoeCombat||f.canoeCondition||50,lead=f.leadership||50,stam=f.stamina||65;
  switch(type){
    case'opening':sc+=m*0.40;sc+=q*0.20;sc+=(sz/20)*100*0.20;sc+=cc*0.10;break;
    case'sustained':sc+=q*0.35;sc+=(sz/20)*100*0.25;sc+=stam*0.20;sc+=lead*0.15;sc+=cc*0.05;break;
    case'turning':sc+=m*0.35;sc+=q*0.25;sc+=lead*0.20;sc*=rf(0.80,1.20);break;
  }
  sc*=tacMod;if(isAtk){sc+=3;sc+=(type==='turning'?5:2);}return sc;
}
function doEngagement(s){
  const tm=TACTIC_MODS[s.attackerTactic]||TACTIC_MODS.measured_push;
  const af={morale:s.morale,quality:s.crewQuality,crewSize:s.crewAlive,canoeCombat:s.canoeCondition*0.6,leadership:55,stamina:70};
  const df={morale:s.defender.morale,quality:s.defender.quality,crewSize:s.defender.crewSize,canoeCombat:s.defender.canoeCombat,leadership:s.defender.leadership,stamina:60};
  let r1a=roundScore(af,'opening',true,tm.atk),r1d=roundScore(df,'opening',false,1.0);
  if(s.surpriseBonus>10)r1a*=1+s.surpriseBonus/100;
  let r2a=roundScore(af,'sustained',true,tm.atk),r2d=roundScore(df,'sustained',false,1.0);
  const tp=pick(TURNING_POINTS);
  let r3a=roundScore(af,'turning',true,tm.atk),r3d=roundScore(df,'turning',false,1.0);
  r3a+=tp.atkB;r3d+=tp.defB;s.turningPoint=tp;
  s.rounds=[
    {name:'Opening Clash',atk:r1a,def:r1d,event:null,winner:r1a>=r1d?'atk':'def'},
    {name:'Sustained Engagement',atk:r2a,def:r2d,event:null,winner:r2a>=r2d?'atk':'def'},
    {name:'Turning Point',atk:r3a,def:r3d,event:tp,winner:r3a>=r3d?'atk':'def'},
  ];
  let ta=(r1a+r2a+r3a)*rf(0.88,1.12),td=(r1d+r2d+r3d)*rf(0.88,1.12);
  s.atkTotal=ta;s.defTotal=td;s.outcomeRatio=ta/Math.max(td,1);
  if(s.outcomeRatio>1.8)s.outcome='DECISIVE_VICTORY';
  else if(s.outcomeRatio>1.3)s.outcome='VICTORY';
  else if(s.outcomeRatio>0.85)s.outcome='STALEMATE';
  else if(s.outcomeRatio>0.55)s.outcome='DEFEAT';
  else s.outcome='DEVASTATING_DEFEAT';
  s.prestigeChange={DECISIVE_VICTORY:30,VICTORY:15,STALEMATE:0,DEFEAT:-15,DEVASTATING_DEFEAT:-30}[s.outcome]||0;
}
function doCasualties(s){
  const isWin=s.outcome==='DECISIVE_VICTORY'||s.outcome==='VICTORY';
  const tm=TACTIC_MODS[s.attackerTactic]||TACTIC_MODS.measured_push;
  let bl=0;
  switch(s.outcome){case'DECISIVE_VICTORY':bl=0.05;break;case'VICTORY':bl=0.12;break;
    case'STALEMATE':bl=0.10;break;case'DEFEAT':bl=0.25;break;case'DEVASTATING_DEFEAT':bl=0.45;break;}
  bl=cl(bl*tm.loss*rf(0.7,1.3),0,0.60);
  const hit=Math.floor(s.crewAlive*bl);
  s.crewKilled=Math.floor(hit*rf(0.2,0.4));s.crewWounded=hit-s.crewKilled;
  s.crewAlive=Math.max(s.crewAlive-s.crewKilled,1);
  let pool=s.namedCrew.filter(c=>c.alive);
  for(let i=0;i<s.crewKilled&&pool.length;i++){const idx=Math.floor(Math.random()*pool.length);pool[idx].alive=false;pool.splice(idx,1);}
  for(let i=0;i<s.crewWounded&&pool.length;i++){const idx=Math.floor(Math.random()*pool.length);pool[idx].wounded=true;pool.splice(idx,1);}
  if(s.outcome==='DEVASTATING_DEFEAT')s.canoeCondition-=ri(30,70);
  else if(s.outcome==='DEFEAT')s.canoeCondition-=ri(10,30);
  else s.canoeCondition-=ri(0,15);
  s.canoeCondition=cl(s.canoeCondition,5,100);
  s.spoils=[];
  if(isWin){if(s.outcome==='DECISIVE_VICTORY'){s.spoils=[{r:'Dried Fish',n:25},{r:'Cedar Bark',n:10},{r:'Dentalium',n:8}];s.cargo=40;}
    else{s.spoils=[{r:'Dried Fish',n:15},{r:'Cedar Bark',n:5}];s.cargo=20;}}
  if(isWin)s.morale+=(s.outcome==='DECISIVE_VICTORY'?20:10);
  else s.morale-=(s.outcome==='DEVASTATING_DEFEAT'?25:15);
  s.morale=cl(s.morale,0,100);s.prestige+=s.prestigeChange;s.feudEscalation+=isWin?3:1;
}

      if(Math.random()<0.30){s.log.push(L('⚠  Cedar Creek reorganizes and charges!','red'));s.crewAlive=Math.max(s.crewAlive-1,1);s.morale-=5;}
      s.log.push(L('The canoe is loaded deep and pushing through the surf.'));break;
    case'mark':s.cargo=Math.floor(s.cargo*0.8);s.prestige+=10;s.feudEscalation+=3;
      s.log.push(L("Before leaving, you drive a carved Eagle post into Cedar Creek's gravel."));
      s.log.push(L('Your crest, facing their longhouse. Every morning, their chief will see it.'));
      s.log.push(L('+10 Prestige · +3 Feud','gold','stat'));break;
  }
  s.statDeltas={cargo:s.cargo-oldCargo,prestige:s.prestige-oldPrestige,feud:s.feudEscalation-oldFeud,crew:s.crewAlive-oldCrew,morale:s.morale-oldMorale};
  s.step='wth_done';return s;
}
function enterAftermath(prev){
  const s=dup(prev);s.scene='village';s.statDeltas={};
  s.log.push(L(''));
  const isWin=s.outcome==='DECISIVE_VICTORY'||s.outcome==='VICTORY';
  const vReady=s.villageReadiness||58;
  const pProg=s.poleProgress||12;
  if(isWin){
    s.log.push(L('Your canoe rounds the south headland and Stoneshell Inlet opens before you. People are already gathering on the beach — they have seen the loaded canoe, and they are cheering.'));
    if(vReady>=70)s.log.push(L('The village is thriving — the smoke racks are full, the longhouses prepared. Your people were ready for this homecoming.','green'));
  }else if(s.outcome==='STALEMATE'){
    s.log.push(L('Your canoe rounds the headland into home water. The village watches in silence. The canoe sits too high in the water — everyone can see it came back light.'));
    if(vReady<40)s.log.push(L('The stores are thin. Coming home light will be felt through the winter.','red'));
  }else{
    s.log.push(L('Your canoe limps around the headland into Stoneshell Inlet. The village sees the empty seats, the blood on the hull. No one cheers. The women begin to wail before you reach the shallows.'));
    if(vReady<40)s.log.push(L('The village was barely holding before you left. This loss cuts deeper than the wound.','red'));
  }
  s.log.push(L(''));
  s.log.push(L(coastMemoryLine(s),'dim'));
  s.log.push(L(''));
  s.traitsEarned=[];
  if(s.crewKilled>0&&!s.warTraits.includes('grief_hardened'))s.traitsEarned.push('grief_hardened');
  if(s.outcome==='DECISIVE_VICTORY'&&!s.warTraits.includes('battle_tested'))s.traitsEarned.push('battle_tested');
  if(s.feudEscalation>12&&!s.warTraits.includes('blood_enemy'))s.traitsEarned.push('blood_enemy');
  if(s.totalRaids>=2&&!s.warTraits.includes('raider'))s.traitsEarned.push('raider');
  s.traitsEarned.forEach(t=>s.warTraits.push(t));
  const newFeud=feudName(s.feudEscalation);
  const oldFeud=feudName(s.feudEscalation-(isWin?3:1));
  if(newFeud==='Blood Feud'){
    s.log.push(L('There is no trade with Cedar Creek. No communication. No peace. Only the next raid, and the one after.','red'));
    if(oldFeud!=='Blood Feud') s.log.push(L('Blood feud declared — humiliation and retaliation have crossed the point of no return.','red','stat'));
  }else if(newFeud==='Active Feud')s.log.push(L('Cedar Creek will remember this. Their chief has lost face. A response is inevitable.'));
  else s.log.push(L('Tensions with Cedar Creek remain. The wound is fresh but may yet heal — or fester.'));
  const ret=isWin?(s.outcome==='DECISIVE_VICTORY'?6:4):0;
  if(ret>0)s.log.push(L(`⏳  Expect retaliation in ~${ret} turns.`,'red'));
  s.log.push(L(''));
  if(s.outcome==='DECISIVE_VICTORY'){
    s.log.push(L('♫  A battle song is composed — "The Beach at Cedar Creek."','gold'));
    if(pProg>=40) s.log.push(L('🪵  The memorial pole nears completion — figures crowd the cedar, each one a story carried home.','gold'));
    else if(pProg>=20) s.log.push(L('🏔  Your master carver deepens the figures on the memorial pole. It grows with every expedition.','gold'));
    else s.log.push(L('🏔  Your master carver offers to begin a war history pole.','gold'));
    s.log.push(L(''));
  }
  /* Pole and village readiness carry-forward bonuses */
  if(isWin&&pProg>=25){const pBonus=Math.round(pProg*0.15);s.prestige+=pBonus;s.log.push(L(`The growing memorial pole raises your standing. +${pBonus} Prestige.`,'gold','stat'));}
  if(isWin&&vReady>=70){const vBonus=Math.round((vReady-60)*0.12);s.morale=cl(s.morale+vBonus,0,100);s.log.push(L(`A strong village welcomes warriors warmly. +${vBonus} Morale.`,'green','stat'));}
  // Trait explanation
  s.traitsEarned.forEach(t=>{
    if(t==='grief_hardened') s.log.push(L('Grief reshapes you. You carry the names of the fallen now.','gold','stat'));
    else if(t==='battle_tested') s.log.push(L('A decisive victory etches your name further into the coastal memory.','gold','stat'));
    else if(t==='blood_enemy') s.log.push(L('The feud has become generational. Cedar Creek will never forgive.','red','stat'));
    else if(t==='raider') s.log.push(L('Multiple expeditions. Your crew knows the rhythm of war.','gold','stat'));
  });
  const toneTxt={DECISIVE_VICTORY:'A great victory — the beach at Cedar Creek was taken without question.',VICTORY:'The crew returned with honor and the spoils to prove it.',STALEMATE:'Neither side could claim victory.',DEFEAT:'A bitter retreat. The village is quieter tonight.',DEVASTATING_DEFEAT:'Many did not return. The village mourns.'}[s.outcome]||'';
  const dead=s.namedCrew.filter(c=>!c.alive).map(c=>c.name);
  let leg=toneTxt;
  if(dead.length>0)leg+=` Lost: ${dead.join(', ')}.`;
  if(s.traitsEarned.length>0)leg+=` Traits: ${s.traitsEarned.join(', ')}.`;
  leg+=` Prestige: ${signStr(s.prestigeChange)}. Feud: ${newFeud}.`;
  s.legacyEntries.push(leg);
  s.totalRaids+=1;
  /* Season wear — village degrades, pole advances on victory */
  if(isWin){s.poleProgress=Math.min(100,(s.poleProgress||12)+5);}
  s.villageReadiness=Math.max(0,(s.villageReadiness||58)-6);
  s.foodStores=Math.max(0,(s.foodStores||72)-8);
  s.canoeReadiness=Math.max(0,(s.canoeReadiness||60)-10);
  s.lastRun={outcome:s.outcome,killed:s.crewKilled,wounded:s.crewWounded,
    spoils:s.spoils.map(sp=>`${sp.r} ×${sp.n}`).join(', ')||'None',
    prestige:signStr(s.prestigeChange),feud:newFeud,named_dead:dead};
  // Impact frames — prioritized
  if(dead.length>0) s.impactFrame={type:'fallen',names:dead};
  else if(newFeud==='Blood Feud'&&oldFeud!=='Blood Feud') s.impactFrame={type:'bloodfeud'};
  else if(s.traitsEarned.length>0) s.impactFrame={type:'trait',traits:s.traitsEarned};
  else s.impactFrame={type:'phase_enter',phase:5,title:isWin?'HOMECOMING':'MOURNING SHORE',subtitle:isWin?'The canoe returns under witness firelight. Every eye in the village turns toward the beach.':'The canoe returns in silence. Stoneshell Inlet sees who did not come back.',place:WORLD.home.name,isWin};
  savePersist(persistFromState(s));s.step='aft_show';return s;
}

/* ── Ceremony / Potlatch choice ── */
function pickCeremony(prev,id){
  const s=dup(prev); s.statDeltas={};
  const isWin=s.outcome==='DECISIVE_VICTORY'||s.outcome==='VICTORY';
  switch(id){
    case'potlatch':{
      const spent=Math.min(s.cargo,Math.round(s.cargo*0.6));
      const pGain=Math.round(spent*1.5);
      s.cargo-=spent;s.prestige+=pGain;s.morale=cl(s.morale+10,0,100);
      s.foodStores=Math.min(100,(s.foodStores||72)+8);
      s.log.push(L('The feast fires burn high. Dried fish and cedar bark are laid out for every family. Songs rise. Names are spoken.'));
      s.log.push(L(`You redistribute ${spent} cargo — the village remembers generosity.`));
      s.log.push(L(''));s.log.push(L(`+${pGain} Prestige · +10 Morale · +8 Food · −${spent} Cargo`,'gold','stat'));
      break;}
    case'advance_pole':{
      const pAdv=isWin?12:6;
      s.poleProgress=Math.min(100,(s.poleProgress||12)+pAdv);
      s.prestige+=8;
      if(s.poleProgress>=80){
        s.log.push(L('🪵 The memorial pole stands almost complete. Its figures tell the story of every crossing, every loss, every victory.','gold'));
        s.log.push(L('When it is raised, the coast will see your lineage from the water.','gold'));
      }else{
        s.log.push(L('The carvers work through the night. Cedar chips pile around the base of the growing pole.'));
        s.log.push(L('New figures emerge: the canoe, the warriors, the shore at Cedar Creek.'));
      }
      s.log.push(L(''));s.log.push(L(`+${pAdv} Pole Progress · +8 Prestige`,'gold','stat'));
      break;}
    case'peace_offering':{
      const fReduce=Math.min(3,s.feudEscalation);
      s.feudEscalation=Math.max(0,s.feudEscalation-fReduce);
      s.prestige+=5;s.morale+=5;
      s.log.push(L('A message-canoe is sent south with gifts: oil, woven blankets, and a carved peace speaker.'));
      s.log.push(L('It will not end the feud. But it may slow the next retaliation.'));
      s.log.push(L(''));s.log.push(L(`−${fReduce} Feud · +5 Prestige · +5 Morale`,'green','stat'));
      break;}
    case'reserve_stores':{
      const fGain=Math.round((s.cargo||0)*0.4);
      s.foodStores=Math.min(100,(s.foodStores||72)+fGain);
      s.villageReadiness=Math.min(100,(s.villageReadiness||58)+10);
      s.log.push(L('The spoils are carried to the longhouse stores. No feast tonight — but the village will eat through winter.'));
      s.log.push(L(''));s.log.push(L(`+${fGain} Food Stores · +10 Village Readiness`,'green','stat'));
      break;}
  }
  s.log.push(L(''));s.log.push(L('The witness fires die down. The season turns. Home Waters will wake again.'));
  savePersist(persistFromState(s));
  s.step='aft_done';return s;
}

/* ══════════════════════════════════════════════════════════════════════
   TRADE VOYAGE — multi-step: route → event → negotiate → resolve
   ══════════════════════════════════════════════════════════════════════ */
function pickTradeEvent(prev,id){
  const s=dup(prev);s.statDeltas={};
  const oldMorale=s.morale,oldCargo=s.cargo,oldCanoe=s.canoeCondition;
  const evt=s.tradeEventId;
  switch(evt){
    case'rival_traders':
      if(id==='race'){
        s.morale=cl(s.morale-3,0,100);
        s.canoeCondition=Math.max(0,s.canoeCondition-5);
        s.tradeGoodsQuality+=15;
        s.log.push(L('A Skidegate trade canoe appears on the same heading — racing for the same port. Your crew digs deep, pushing past them in a spray of white water.'));
        s.log.push(L(''));s.log.push(L('First to port. +15 Goods Quality · −5 Canoe · −3 Morale','dim','stat'));
      }else{
        s.morale=cl(s.morale+3,0,100);
        s.log.push(L('A Skidegate trade canoe is headed the same direction. Rather than race, you paddle alongside and share route knowledge. They mention a sheltered cove ahead.'));
        s.log.push(L(''));s.log.push(L('+3 Morale. Shared knowledge.','green','stat'));
      }
      break;
    case'port_welcome':
      if(id==='feast'){
        s.morale=cl(s.morale+8,0,100);
        s.tradeGoodsQuality+=10;
        s.cargo=Math.max(0,s.cargo-3);
        s.log.push(L('Smoke rises from a small settlement on the headland. They invite you ashore. Fish, stories, and laughter — and they offer first pick of their copper stock.'));
        s.log.push(L(''));s.log.push(L('+8 Morale · +10 Goods Quality · −3 Cargo (gifts)','green','stat'));
      }else{
        s.tradeGoodsQuality+=5;
        s.log.push(L('A settlement offers welcome, but you wave and keep paddling. Time is the trader\'s real currency. They toss a small copper ingot as you pass — a gesture of goodwill.'));
        s.log.push(L(''));s.log.push(L('+5 Goods Quality. Steady progress.','dim','stat'));
      }
      break;
    case'suspicious_customs':
      if(id==='comply'){
        s.cargo=Math.max(0,s.cargo-5);
        s.prestige+=5;
        s.log.push(L('Warriors on the shore demand a toll — passage through their waters costs trade goods. You hand over oil and dried fish. They let you through without trouble.'));
        s.log.push(L(''));s.log.push(L('−5 Cargo · +5 Prestige (respected protocol)','dim','stat'));
      }else{
        s.morale=cl(s.morale-5,0,100);
        if(Math.random()<0.4){
          s.canoeCondition=Math.max(0,s.canoeCondition-8);
          s.log.push(L('You refuse the toll and push past. Stones from the shore crack against the hull. Your crew flinches but keeps paddling.','red'));
          s.log.push(L(''));s.log.push(L('−5 Morale · −8 Canoe — hostile passage','red','stat'));
        }else{
          s.log.push(L('You refuse the toll and push past. They shout but do not pursue. Your crew is tense but intact.'));
          s.log.push(L(''));s.log.push(L('−5 Morale. Kept your goods.','dim','stat'));
        }
      }
      break;
    case'storm_cargo':
      if(id==='secure'){
        s.canoeCondition=Math.max(0,s.canoeCondition-4);
        s.log.push(L('A sudden squall hits. Your crew lashes the cargo tight, but the canoe takes water. When the sky clears, everything is intact — just soaked.'));
        s.log.push(L(''));s.log.push(L('Cargo safe. −4 Canoe.','dim','stat'));
      }else{
        s.cargo=Math.max(0,s.cargo-ri(3,6));
        s.morale=cl(s.morale+4,0,100);
        s.log.push(L('The squall hits hard. Rather than risk the hull, you dump heavy cargo over the side. The canoe rides higher, safer. Some goods sink into the grey water.','red'));
        s.log.push(L(''));s.log.push(L(`−${s.cargo<5?'some':'a few'} Cargo · +4 Morale (crew safe)`,s.cargo<5?'red':'dim','stat'));
      }
      break;
  }
  s.statDeltas={morale:s.morale-oldMorale,cargo:s.cargo-oldCargo,canoe:s.canoeCondition-oldCanoe};
  s.log.push(L(''));s.log.push(L('The northern settlement appears ahead. How will you approach the trade?'));
  s.step='trv_trade_negotiate';return s;
}

function pickTradeNegotiation(prev,id){
  const s=dup(prev);s.statDeltas={};
  const quality=s.tradeGoodsQuality||50;
  let profitBase=ri(12,28);
  let prestigeGain=0,foodGain=0,moraleGain=0;
  switch(id){
    case'generous':{
      const bonus=Math.round(quality*0.3);
      profitBase=Math.round(profitBase*0.7);
      prestigeGain=Math.round(profitBase*0.8)+bonus;
      foodGain=8;moraleGain=8;
      s.feudEscalation=Math.max(0,s.feudEscalation-1);
      s.log.push(L('You spread your goods wide — oil, woven cedar, dried halibut — and ask only for fair exchange. The northern chief smiles. Copper and dentalium flow freely.'));
      s.log.push(L('"Come back before the storms. You are welcome here."'));
      break;}
    case'hard_bargain':{
      profitBase=Math.round(profitBase*1.3);
      prestigeGain=Math.round(profitBase*0.4);
      foodGain=14;moraleGain=3;
      s.log.push(L('You hold back your best goods until the price rises. Three rounds of back-and-forth. They grumble but pay what the market demands.'));
      s.log.push(L('More cargo, less goodwill — but the canoe sits heavy with copper.'));
      break;}
    case'gift_first':{
      const giftCost=Math.round(profitBase*0.2);
      profitBase=Math.round(profitBase*0.9);
      prestigeGain=Math.round(profitBase*0.6)+15;
      foodGain=10;moraleGain=6;
      s.feudEscalation=Math.max(0,s.feudEscalation-1);
      s.log.push(L('Before any trade begins, you present gifts — a carved box, the finest oil. The gesture is noticed. When bargaining starts, the terms are warmer.'));
      s.log.push(L('Generosity opens doors that force cannot.'));
      break;}
  }
  s.cargo+=profitBase;s.prestige+=prestigeGain;
  s.foodStores=Math.min(100,(s.foodStores||72)+foodGain);
  s.morale=cl(s.morale+moraleGain,0,100);
  s.outcome='TRADE_SUCCESS';s.prestigeChange=prestigeGain;
  s.log.push(L(''));
  s.log.push(L(`Trade complete: +${profitBase} Cargo · +${prestigeGain} Prestige · +${foodGain} Food · +${moraleGain} Morale`,'green','stat'));
  s.log.push(L(''));s.log.push(L('The return voyage is calm. Your canoe rounds the south headland heavy with copper and shell. The village sees the loaded hull and begins to cheer.'));
  s.totalRaids+=1;
  /* Season wear */
  s.villageReadiness=Math.max(0,(s.villageReadiness||58)-4);
  s.foodStores=Math.max(0,s.foodStores-5);
  s.canoeReadiness=Math.max(0,(s.canoeReadiness||60)-6);
  s.lastRun={outcome:'TRADE_SUCCESS',killed:0,wounded:0,spoils:`Copper, shell, +${profitBase} cargo`,prestige:signStr(prestigeGain),feud:feudName(s.feudEscalation),named_dead:[]};
  s.legacyEntries.push(`Trade voyage to the north: +${profitBase} cargo, +${prestigeGain} prestige. ${feudName(s.feudEscalation)}.`);
  s.impactFrame={type:'phase_enter',phase:5,title:'TRADE RETURN',subtitle:'Goods and goodwill. The canoe returns heavy with copper and shell.',place:WORLD.home.name,isWin:true};
  s.scene='village';
  savePersist(persistFromState(s));s.step='aft_show';return s;
}

/* ══════════════════════════════════════════════════════════════════════
   DIPLOMACY VOYAGE — multi-step: route → event → council → resolve
   ══════════════════════════════════════════════════════════════════════ */
function pickDiploEvent(prev,id){
  const s=dup(prev);s.statDeltas={};
  const oldMorale=s.morale,oldPrestige=s.prestige;
  const evt=s.diploEventId;
  switch(evt){
    case'rival_delegation':
      if(id==='wait'){
        s.diploTrust+=10;
        s.morale=cl(s.morale-3,0,100);
        s.log.push(L('A Skidegate delegation is already anchored at the far shore — they arrived first. Your elder advises patience. You wait offshore until their canoe departs before landing.'));
        s.log.push(L(''));s.log.push(L('+10 Trust (patience respected) · −3 Morale','dim','stat'));
      }else{
        s.prestige+=5;
        s.diploTrust-=5;
        s.log.push(L('A rival delegation is at the far shore. You land anyway, side by side. The display of confidence draws attention — but it also raises tension.'));
        s.log.push(L(''));s.log.push(L('+5 Prestige · −5 Trust (bold entrance)','dim','stat'));
      }
      break;
    case'gift_protocol':
      if(id==='follow'){
        s.diploTrust+=15;
        s.cargo=Math.max(0,s.cargo-4);

        s.log.push(L(''));s.log.push(L('+15 Trust (protocol honored) · −4 Cargo (gifts)','green','stat'));
      }else{
        s.diploTrust+=5;
        s.prestige+=3;
        s.log.push(L('You offer the gifts your own way — practical, direct. The far-shore chief accepts them with a slight frown. Not wrong, but not the old way.'));
        s.log.push(L(''));s.log.push(L('+5 Trust · +3 Prestige (showed independence)','dim','stat'));
      }
      break;
    case'ambush_warning':
      if(id==='cautious'){
        s.diploTrust+=8;
        s.canoeCondition=Math.max(0,s.canoeCondition-3);
        s.log.push(L('A fisherman warns you: "Armed warriors on the north bluff." Your crew takes the long way around, arriving from the sheltered side. The far-shore chief notes your caution with approval.'));
        s.log.push(L(''));s.log.push(L('+8 Trust · −3 Canoe (longer route)','dim','stat'));
      }else{
        s.prestige+=8;
        s.morale=cl(s.morale-4,0,100);
        s.log.push(L('The warning of armed warriors does not slow you. You paddle straight in, speaking staff held high. If they want blood, they will have to draw it in front of witnesses.'));
        s.log.push(L(''));s.log.push(L('+8 Prestige (courage) · −4 Morale (tension)','dim','stat'));
      }
      break;
    case'good_omen':
      if(id==='share'){
        s.diploTrust+=12;s.morale=cl(s.morale+5,0,100);

        s.log.push(L(''));s.log.push(L('+12 Trust · +5 Morale','green','stat'));
      }else{
        s.morale=cl(s.morale+8,0,100);
        s.log.push(L('An eagle circles three times. Good fortune. Your crew takes heart but you keep it to yourself — no need to share advantages.'));
        s.log.push(L(''));s.log.push(L('+8 Morale. Private confidence.','green','stat'));
      }
      break;
  }
  s.statDeltas={morale:s.morale-oldMorale,prestige:s.prestige-oldPrestige};
  s.log.push(L(''));s.log.push(L('The council fire is prepared on the far shore. How will you approach?'));
  s.step='trv_diplo_council';return s;
}

function pickDiploCouncil(prev,id){
  const s=dup(prev);s.statDeltas={};
  const trust=s.diploTrust||50;
  let feudReduce=ri(2,4),prestigeGain=0,moraleGain=0;
  switch(id){
    case'humble':{
      const trustBonus=Math.round(trust*0.06);
      feudReduce+=trustBonus;prestigeGain=10+trustBonus;moraleGain=6;
      s.log.push(L('You sit below the far-shore chief. You speak second. You listen more than you talk. Your elder translates the silences — and the silences say: "This one can be trusted."'));
      s.log.push(L('The far-shore chief places a copper shield between you. "Peace between our waters."'));
      break;}
    case'firm':{
      feudReduce+=1;prestigeGain=18;moraleGain=4;
      s.log.push(L('You meet the far-shore chief as an equal. Eye to eye. You lay out your terms clearly: the feud serves neither side. Trade is better than blood. The coast needs stability.'));
      s.log.push(L('A long silence. Then a nod. "We will hold — for now."'));
      break;}
    case'lavish':{
      const giftValue=Math.max(5,Math.round((s.cargo||0)*0.3));
      s.cargo=Math.max(0,s.cargo-giftValue);
      feudReduce+=Math.round(giftValue*0.3);
      prestigeGain=12+Math.round(giftValue*0.5);moraleGain=8;
      s.log.push(L(`You bring out the finest goods — ${giftValue} units of oil, cedar, and carved pieces — and lay them at the council fire. Gasps. Even the far-shore elders are impressed.`));
      s.log.push(L('"Your house speaks with more than words. We hear you."'));
      break;}
  }
  s.feudEscalation=Math.max(0,s.feudEscalation-feudReduce);
  s.prestige+=prestigeGain;s.morale=cl(s.morale+moraleGain,0,100);
  s.outcome='DIPLOMACY_SUCCESS';s.prestigeChange=prestigeGain;
  s.log.push(L(''));
  s.log.push(L(`Diplomacy: −${feudReduce} Feud · +${prestigeGain} Prestige · +${moraleGain} Morale`,'green','stat'));
  s.log.push(L(''));s.log.push(L('The canoe returns under calm skies. The village sees the speaking staff raised high — a sign of words, not war.'));
  s.totalRaids+=1;
  /* Season wear (lighter than raid) */
  s.villageReadiness=Math.max(0,(s.villageReadiness||58)-3);
  s.foodStores=Math.max(0,(s.foodStores||72)-4);
  s.canoeReadiness=Math.max(0,(s.canoeReadiness||60)-5);
  s.lastRun={outcome:'DIPLOMACY_SUCCESS',killed:0,wounded:0,spoils:'Peace terms',prestige:signStr(prestigeGain),feud:feudName(s.feudEscalation),named_dead:[]};
  s.legacyEntries.push(`Diplomatic mission: −${feudReduce} feud, +${prestigeGain} prestige. ${feudName(s.feudEscalation)}.`);
  s.impactFrame={type:'phase_enter',phase:5,title:'PEACE RETURN',subtitle:'Words instead of weapons. The feud cools — for now.',place:WORLD.home.name,isWin:true};
  s.scene='village';
  savePersist(persistFromState(s));s.step='aft_show';return s;
}

/* ═══════════════════════════════════════════════════════════════════════
   §10.5  SHARED SCENE PRIMITIVES
   ═══════════════════════════════════════════════════════════════════════
   Reusable visual building blocks forming a consistent 16-bit art
   language across all phases. Each renders as positioned layer(s) inside
   a scene container. Future sprite art replaces individual blocks
   without restructuring.
   ═══════════════════════════════════════════════════════════════════════ */

/* ── Star Field ── */
function StarField({count=15,brightness='#c0c0e8',region=24}){
  const pts=useMemo(()=>Array.from({length:count},()=>({
    x:2+Math.random()*96,y:1+Math.random()*region,
    sz:0.7+Math.random()*1.5,d:Math.random()*3,

function ForestLine({yTop,height,color='#1c3e2c',altColor='#183828',density=80,speed='mid',zIndex=4}){

  return<div style={{position:'absolute',top:yTop,left:0,width:'200%',height,zIndex}}
    className={speed==='mid'?'tl-shore-mid':'tl-shore-far'}>
    <div style={{position:'absolute',bottom:0,left:0,width:'100%',height:'100%'}}>
      {trees.map((t,i)=><div key={i} style={{position:'absolute',bottom:0,left:t.tx+'%',

/* ═══ AFTERMATH SCENE — outcome-aware ceremony, village memory ═══ */
function AftermathScene({G,sceneH}){
  const H=sceneH||220,skyH=H*0.28,mtH=H*0.12,shoreH=H*0.08;
  const landTop=skyH+mtH+shoreH;const groundH=H*0.22;const waterH=H-landTop-groundH;
  const gb=waterH+groundH;
  const isDecisive=G&&G.outcome==='DECISIVE_VICTORY';
  const isWin=G&&(G.outcome==='DECISIVE_VICTORY'||G.outcome==='VICTORY'||G.outcome==='TRADE_SUCCESS'||G.outcome==='DIPLOMACY_SUCCESS');
  const isStale=G&&G.outcome==='STALEMATE';
  const isDef=G&&G.outcome==='DEFEAT';
  const isDev=G&&G.outcome==='DEVASTATING_DEFEAT';
  const hasDead=G&&G.crewKilled>0;
  /* Ceremony intensity — drives fire, crowd, warmth */
  const ci=isDecisive?3:isWin?2:isStale?1:isDef?0:-1;
  const fireSize=ci>=3?'large':ci>=1?'medium':'small';
  const crowdN=ci>=3?8:ci>=2?6:ci>=1?4:isDef?2:1;
  const crowdMood=ci>=2?'warm':ci<=0?(hasDead?'grief':'solemn'):'neutral';
  const shoreMood=ci>=2?'warm':ci>=1?'solemn':hasDead?'grief':'solemn';
  const skyGrad=isWin?SCENE_SKY.aftermath_w:SCENE_SKY.aftermath_l;

    {isWin&&<SceneLayer zIndex={2} className="tl-home-glow" style={{left:'36%',top:skyH+mtH+4,width:120,height:40,

    {/* Shore ground */}
    <div style={{position:'absolute',top:landTop,left:0,right:0,height:groundH,zIndex:4,
      background:'linear-gradient(180deg,#1c3018 0%,#1e3014 40%,#243018 100%)'}}>
      {[8,18,30,42,56,68,80,92].map((x,i)=><div key={i} style={{position:'absolute',top:-2-(i%3)*2,left:x+'%',

    {ci>=2&&<Longhouse x="82%" w={44} h={18} bottom={gb-1} smoke={true} fireGlow={true} zIndex={5}/>}
    {ci>=2&&<SceneLayer zIndex={4} className="tl-home-glow" style={{left:'46%',bottom:gb-2,width:100,height:34,

    {/* Carved frontage on main longhouse (victory ceremony) */}
    {isWin&&<div style={{position:'absolute',bottom:gb+8,left:'50%',width:64,height:3,zIndex:6,

    {/* ── Ceremonial Poles (prestige / memory) ── */}
    <CeremonialPole x="42%" h={isDecisive?58:ci>=1?46:38} bottom={gb} gold={isWin} zIndex={7}/>
    {ci>=2&&<CeremonialPole x="78%" h={36} bottom={gb-1} gold={true} zIndex={7}/>}
    {/* New pole earned on decisive — taller, golden glow */}

      <CeremonialPole x={0} h={44} bottom={0} gold={true}/>
      <div style={{position:'absolute',bottom:0,left:-3,width:20,height:50,
        background:`radial-gradient(ellipse at 50% 30%,${P.gold}08,transparent 70%)`,pointerEvents:'none'}}/>
    </div>}
    {/* ── Memorial Post (when warriors have fallen) ── */}
    {hasDead&&<CeremonialPole x={isWin?"90%":"32%"} h={32} bottom={gb} gold={false} memorial={true} zIndex={7}/>}
    {/* ── Central Ceremonial Fire (ceremony warmth) ── */}
    <CeremonialFire x="55%" bottom={gb+2} size={fireSize} zIndex={7} mood={hasDead&&!isWin?'grief':'warm'}/>
    {ci>=2&&<RoleFigure role="ceremonialLeader" x="51%" bottom={gb+4} zIndex={7} glow={`radial-gradient(ellipse at 50% 35%,${P.gold}06,transparent 72%)`} />}
    {(ci>=1||hasDead)&&<RoleFigure role="elder" x={hasDead&&!isWin?'28%':'73%'} bottom={gb+2} zIndex={6} opacity={ci>=2?0.95:0.88}/>} 
    {/* Small secondary fire for victory feast */}
    {isDecisive&&<CeremonialFire x="35%" bottom={gb+1} size="small" zIndex={7} mood="warm"/>}
    {/* ── Witness Clusters — village gathering ── */}
    <WitnessCluster x="50%" bottom={gb+2} count={crowdN} mood={crowdMood} zIndex={6}/>
    {ci>=2&&<WitnessCluster x="65%" bottom={gb+2} count={3} mood="warm" zIndex={6}/>}
    {ci>=3&&<WitnessCluster x="36%" bottom={gb+2} count={4} mood="warm" zIndex={6}/>}
    {ci>=2&&<WitnessCluster x="84%" bottom={gb+1} count={2} mood={isWin?'warm':'neutral'} zIndex={6}/>}
    {/* Solitary mourner near memorial (defeat + dead) */}
    {!isWin&&hasDead&&<Figure x="30%" bottom={gb+2} type="sitting" hasHat={false} hasWeapon={false} tone="home" zIndex={6}/>}
    {/* ── Goods / Offerings displayed (prestige / generosity) ── */}
    {isDecisive&&<><GoodsPile x="58%" bottom={gb+2} size="large" zIndex={5}/>
      <GoodsPile x="44%" bottom={gb+1} size="medium" zIndex={5}/></>}
    {isWin&&!isDecisive&&<GoodsPile x="61%" bottom={gb+1} size="medium" zIndex={5}/>}
    {(isWin&&G.cargo>25)&&<GoodsPile x="71%" bottom={gb+1} size="medium" zIndex={5}/>} 
    {/* ── Ceremony SVGs — visible during ceremony choice ── */}
    {G&&G.step==='aft_show'&&isWin&&<>
      <FeastFireSVG x="55%" bottom={gb+6} zIndex={7}/>
      <ExternalCouncilFire x="54%" bottom={gb+4} w={38} zIndex={6}/>
      <FeastGoodsSVG x="62%" bottom={gb+2} zIndex={6}/>
      <ExternalTradeGoods x="60%" bottom={gb+1} w={48} zIndex={5}/>
      <CeremonyGatheringSVG x="30%" bottom={gb+1} zIndex={6}/>
      {(G.poleProgress||0)>=20&&<PoleRaisingSVG x="18%" bottom={gb} zIndex={8}/>}
      {(G.poleProgress||0)>=10&&<GrowingMemorialPole x="20%" bottom={gb+1} h={44} poleProgress={G.poleProgress||0} zIndex={7}/>}

      <CopperShieldDisplay x="48%" bottom={gb+4} h={24} zIndex={8}/>
      <ExternalTradeGoods x="38%" bottom={gb+2} w={56} zIndex={6}/>

      :<ReturnCanoe left="4%" bottom={waterH-2} w={82} isWin={!!isWin} hasDead={!!hasDead} damaged={!!(isDev||isDef)} zIndex={6} anim="tl-canoe-home 6s ease-in-out infinite"/>}

      <WitnessCluster x="28px" bottom={1} count={isWin?4:isStale?2:1} mood={shoreMood} zIndex={7}/>
    </SceneLayer>
    {/* Water */}
    <WaterBody top={landTop+groundH}

    {isWin&&<WakeTrail left="12%" bottom={waterH-1} width={80} strength="strong" zIndex={5}/>} 
    {/* ── Atmospheric ceremony warmth / cold ── */}
    {ci>=2&&<FireGlow x="55%" bottom={0} r={120} color="200,140,60" intensity={0.07} zIndex={2}/>}
    <FireGlow x="55%" bottom={gb-4} r={ci>=2?65:35} color={isWin?"200,140,60":"140,100,80"} intensity={ci>=2?0.22:0.1} zIndex={4}/>
    {/* Victory warm overlay */}
    {isDecisive&&<SceneLayer zIndex={9} className="tl-ceremony-glow" style={{inset:0,
      background:'radial-gradient(ellipse at 55% 65%,rgba(200,140,40,.04),transparent 50%)'}}/>}
    {/* Grief / cold overlay (defeat) */}
    {isDev&&<SceneLayer zIndex={9} style={{inset:0,
      background:'linear-gradient(180deg,rgba(10,4,18,.15),transparent 40%,transparent 60%,rgba(10,4,18,.2))'}}/>}
    {isDef&&<SceneLayer zIndex={9} style={{inset:0,
      background:'linear-gradient(180deg,rgba(8,4,14,.08),transparent 30%,transparent 70%,rgba(8,4,14,.1))'}}/>}
    <SceneLayer zIndex={9} style={{inset:0,
      background:ci>=2?'linear-gradient(180deg,rgba(200,140,60,.03),transparent 24%,transparent 76%,rgba(200,140,60,.03))'

    <Vignette color={isWin?"8,6,16":"6,4,10"} intensity={isWin?0.10:isDev?0.20:0.15} focus="55% 55%"/>
  </div>;
}

/* ═══ TRAVEL SCENE — premium 16-bit composition ═══ */
function TravelScene({sceneH,G}){
  const H=sceneH||220;
  const skyH=H*0.30;  // sky band
  const mtH=H*0.14;   // distant mountains
  const shoreH=H*0.10;// mid-ground forest
  const waterTop=skyH+mtH+shoreH;
  const waterH=H-waterTop;

  /* ── Stroke cycle: 2.4s per full catch→pull→exit→recovery ── */
  const CYCLE=2.4;

  /* ── Crew seats: 8 paddlers packed into the canoe's working middle ── */
  const crew=useMemo(()=>{
    return[
      {x:38,side:'p',delay:0},
      {x:49,side:'s',delay:0.06},
      {x:60,side:'p',delay:0.12},
      {x:71,side:'s',delay:0.18},
      {x:82,side:'p',delay:0.24},
      {x:93,side:'s',delay:0.3},
      {x:104,side:'p',delay:0.36},
      {x:115,side:'s',delay:0.42},
    ];
  },[]);

  /* ── Paddler silhouette — exaggerated port/starboard lateral offset ── */
  const Paddler=({x,side,delay})=>{
    const isP=side==='p';
    const xOff=isP?-1:7;
    const yOff=isP?5:19;
    const bodyAnim=isP?'tl-row-port':'tl-row-star';
    const oarAnim=isP?'tl-oar-port':'tl-oar-star';
    const z=isP?10:11;
    /* Port = brighter for near-side clarity, starboard = lifted just enough to read over the hull */
    const hat1=isP?'#5a4420':'#594226';
    const hat2=isP?'#4a3418':'#45301b';
    const skin=isP?'#2e2014':'#302116';
    const torso=isP?'#281c14':'#2d2118';
    const shaft1=isP?'#6a4820':'#694924';
    const shaft2=isP?'#5a3818':'#55371b';
    const blade=isP?'#5a3818':'#4c3019';
    const silhouetteFilter=isP
      ?'drop-shadow(0 0 1px rgba(0,0,0,.12))'
      :'brightness(1.08) saturate(.9) contrast(1.03) drop-shadow(0 0 2px rgba(8,12,20,.34))';
    const rowerOpacity=isP?1:.96;
    /* Paddle is on the OUTSIDE of the canoe — port=left, starboard=right */
    const padX=isP?-6:15;
    const paddleVisibleH=isP?28:16;
    const paddleTop=isP?6:4;
    return(
      <div className="tl-paddler" style={{
        position:'absolute',bottom:yOff,left:x+xOff,width:14,height:28,
        animation:`${bodyAnim} ${CYCLE}s ease-in-out ${delay}s infinite`,
        zIndex:z,
        filter:silhouetteFilter,
        opacity:rowerOpacity,
      }}>
        {/* woven hat — conical, wider for readability */}
        <div style={{position:'absolute',top:0,left:0,width:14,height:6,
          background:`linear-gradient(180deg,${hat1},${hat2})`,
          clipPath:'polygon(50% 0%,100% 100%,0% 100%)',
        }}/>
        {/* head */}
        <div style={{position:'absolute',top:5,left:3,width:8,height:5,
          background:skin,borderRadius:'40%'}}/>
        {/* torso — slightly offset toward paddle side */}
        <div style={{position:'absolute',top:9,left:isP?1:3,width:10,height:9,
          background:torso,borderRadius:'2px 2px 1px 1px'}}/>
        {/* near arm reaching out */}
        <div style={{position:'absolute',top:10,left:isP?-2:12,width:3,height:5,
          background:torso,borderRadius:1,transform:`rotate(${isP?-18:18}deg)`}}/>
        {/* paddle assembly — shaft+blade on the CORRECT side */}
        <div style={{
          position:'absolute',top:paddleTop,left:padX,width:12,height:paddleVisibleH,
          transformOrigin:isP?'8px 3px':'2px 2px',
          animation:`${oarAnim} ${CYCLE}s ease-in-out ${delay}s infinite`,
        }}>
          {/* shaft — thicker for readability */}
          <div style={{position:'absolute',top:0,left:isP?5:2,width:isP?3:2,height:isP?20:13,
            background:`linear-gradient(180deg,${shaft1},${shaft2})`,borderRadius:1}}/>
          {isP
            ?<div style={{position:'absolute',top:18,left:3,width:6,height:7,
              background:`linear-gradient(180deg,${shaft2},${blade})`,
              borderRadius:'1px 1px 4px 4px'}}/>
            :<div style={{position:'absolute',top:-1,left:0,width:6,height:3,
              background:`linear-gradient(180deg,${shaft1},${shaft2})`,borderRadius:'2px 2px 1px 1px'}}/>
          }
        </div>
        {/* paddle catch splash — on correct side */}
        <div style={{position:'absolute',top:33,left:padX+2,width:8,height:3,
          background:'radial-gradient(ellipse,rgba(100,170,220,.4),transparent)',
          borderRadius:'50%',pointerEvents:'none',
          animation:`tl-paddle-splash ${CYCLE}s ease-in-out ${delay}s infinite`,
        }}/>
      </div>
    );
  };

  return(
    <div className="tl-scene-arrival" style={{height:H,position:'relative',overflow:'hidden',background:SCENE_SKY.travel}}>
      <StarField count={20} region={22}/>
      <SceneMoon right="14%" top="6%" size={22}/>

      <SceneLayer zIndex={2} className="tl-cloud" style={{top:'12%',left:'-20%',width:'18%',height:6,
        background:'linear-gradient(90deg,transparent,rgba(140,150,170,.06),rgba(140,150,170,.1),rgba(140,150,170,.06),transparent)',
        borderRadius:3,animationDelay:'0s'}}/>
      <SceneLayer zIndex={2} className="tl-cloud" style={{top:'18%',left:'-10%',width:'12%',height:4,
        background:'linear-gradient(90deg,transparent,rgba(120,130,160,.05),rgba(120,130,160,.08),rgba(120,130,160,.05),transparent)',
        borderRadius:3,animationDelay:'30s'}}/>

      <MountainRange yTop={skyH-8} height={mtH+16} fill1="#223848" fill2="#284650" zIndex={3}/>
      <SceneLayer zIndex={3} className="tl-shore-far" style={{top:skyH-2,left:0,width:'200%',height:6}}>
        {[{x:50,w:6},{x:65,w:4},{x:40,w:5},{x:150,w:5},{x:165,w:4}].map((p,i)=><div key={i} style={{position:'absolute',left:p.x+'%',top:0,width:p.w,height:2,background:'rgba(200,210,230,.15)',borderRadius:1}}/>)}
      </SceneLayer>
      <ForestLine yTop={skyH+mtH-12} height={shoreH+20} color="#1c3e2c" altColor="#183828" density={80} zIndex={4}/>

      <FogBand top={skyH+mtH-4} height={18} opacity={0.1} color="140,160,180" zIndex={5}/>
      <FogBand top={skyH+mtH+shoreH-6} height={14} opacity={0.09} color="120,140,170" delay={5} speed={18} zIndex={5}/>
      <WaterBody top={waterTop} gradient="linear-gradient(180deg,#204c72 0%,#1a4468 20%,#163c60 45%,#123458 70%,#102c50 100%)" waveCount={9} phosphorCount={18} zIndex={5}/>
      <FogBand top={waterTop+waterH*0.3} height={10} opacity={0.07} color="100,120,150" delay={10} speed={22} zIndex={7}/>

      <SceneLayer zIndex={6} style={{top:waterTop+8,right:'13%',width:28,height:waterH-20,
        background:'linear-gradient(180deg,rgba(200,190,160,.1) 0%,rgba(200,190,160,.03) 40%,transparent 100%)',filter:'blur(2px)'}}/>
      <SceneLayer zIndex={7} style={{left:'14%',top:waterTop+18,width:'58%',height:40,
        background:'radial-gradient(ellipse,rgba(110,160,210,.06) 0%,transparent 72%)'}}/>

      <TravelHeroCanoe left="26%" bottom={waterH*0.32} width={176} crew={crew} Paddler={Paddler} CYCLE={CYCLE} zIndex={8}/>

      {/* ── Voyage Event SVGs — contextual to current event ── */}
      {G&&G.step==='trv_event'&&G.voyageEventId==='whale'&&<WhaleBreachSVG x="55%" bottom={waterH*0.45} zIndex={7}/>}
      {G&&G.step==='trv_event'&&G.voyageEventId==='rival_canoe'&&<RivalCanoeSVG x="65%" bottom={waterH*0.55} zIndex={7}/>}
      {G&&G.step==='trv_event'&&G.voyageEventId==='fog_bank'&&<FogWallSVG x="15%" bottom={waterH*0.2} zIndex={6}/>}
      {G&&G.step==='trv_event'&&G.voyageEventId==='flotsam'&&<FlotsamSVG x="50%" bottom={waterH*0.35} zIndex={7}/>}
      {G&&G.step==='trv_event'&&G.voyageEventId==='bird_omen'&&<RavenOmenSVG x="32%" bottom={waterH*0.32+20} zIndex={9}/>}
      {/* ── Trade voyage SVGs ── */}
      {G&&G.step==='trv_trade_event'&&G.tradeEventId==='rival_traders'&&<RivalTraderSVG x="62%" bottom={waterH*0.52} zIndex={7}/>}
      {G&&G.step==='trv_trade_event'&&G.tradeEventId==='port_welcome'&&<TradePortSettlement x="52%" bottom={waterH*0.08} w={110} zIndex={4}/>}
      {G&&G.step==='trv_trade_event'&&G.tradeEventId==='port_welcome'&&<TradePortSVG x="68%" bottom={waterH*0.15} zIndex={6}/>}
      {G&&G.step==='trv_trade_event'&&G.tradeEventId==='suspicious_customs'&&<TradePortSettlement x="48%" bottom={waterH*0.06} w={100} zIndex={4}/>}
      {G&&G.step==='trv_trade_event'&&G.tradeEventId==='suspicious_customs'&&<TradePortSVG x="66%" bottom={waterH*0.15} zIndex={6}/>}
      {G&&G.step==='trv_trade_event'&&G.tradeEventId==='storm_cargo'&&<FlotsamSVG x="50%" bottom={waterH*0.35} zIndex={7}/>}
      {G&&G.step==='trv_trade_negotiate'&&<TradePortSettlement x="46%" bottom={waterH*0.05} w={120} zIndex={4}/>}
      {G&&G.step==='trv_trade_negotiate'&&<ExternalTradeGoods x="56%" bottom={waterH*0.16} w={52} zIndex={7}/>}
      {G&&G.step==='trv_trade_negotiate'&&<CopperShieldDisplay x="52%" bottom={waterH*0.22} h={18} zIndex={7}/>}
      {G&&G.step==='trv_trade_negotiate'&&<TradePortSVG x="62%" bottom={waterH*0.12} zIndex={6}/>}
      {G&&G.step==='trv_trade_negotiate'&&<GiftPileSVG x="52%" bottom={waterH*0.18} zIndex={7}/>}
      {/* ── Diplomacy voyage SVGs ── */}
      {G&&G.expeditionType==='diplomacy'&&G.step==='trv_route'&&<DiplomacyCanoeFlag x="30%" bottom={waterH*0.32+20} zIndex={9}/>}
      {G&&G.expeditionType==='diplomacy'&&G.step==='trv_route'&&<SpeakingStaffDisplay x="34%" bottom={waterH*0.32+8} h={28} zIndex={9}/>}
      {G&&G.step==='trv_diplo_event'&&<DiplomacyCanoeFlag x="30%" bottom={waterH*0.32+20} zIndex={9}/>}
      {G&&G.step==='trv_diplo_event'&&<SpeakingStaffDisplay x="34%" bottom={waterH*0.32+8} h={28} zIndex={9}/>}
      {G&&G.step==='trv_diplo_council'&&<TradePortSettlement x="50%" bottom={waterH*0.06} w={100} zIndex={4}/>}
      {G&&G.step==='trv_diplo_council'&&<ExternalCouncilFire x="58%" bottom={waterH*0.12} w={42} zIndex={7}/>}
      {G&&G.step==='trv_diplo_council'&&<SpeakingStaffDisplay x="64%" bottom={waterH*0.18} h={24} zIndex={7}/>}
      {G&&G.step==='trv_diplo_council'&&<CouncilFireSVG x="58%" bottom={waterH*0.15} zIndex={7}/>}
      {G&&G.step==='trv_diplo_council'&&<GiftPileSVG x="42%" bottom={waterH*0.18} zIndex={7}/>}
      {G&&G.voyageWeather==='squall'&&<>
        <SceneLayer zIndex={10} style={{inset:0,background:'linear-gradient(180deg,rgba(20,30,40,.15),transparent 40%,transparent 60%,rgba(20,30,40,.1))',pointerEvents:'none'}}/>
        <FogBand top={skyH} height={30} opacity={0.14} color="80,90,110" speed={8} zIndex={6}/>
      </>}

      <SceneLayer zIndex={9} style={{left:0,right:0,bottom:0,height:waterH*0.3,
        background:'linear-gradient(180deg,transparent 0%,rgba(4,8,18,.15) 100%)'}}/>
      <Vignette color="4,8,18" intensity={0.10} focus="50% 45%"/>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════════════
   FEATURED SVG SCENES — dedicated compositions where new art assets
   are large, centered, and fully animated instead of tiny background props.
   Each scene tells a visual story: Potlatch, Diplomacy, Trade, Provision.
   ═══════════════════════════════════════════════════════════════════════ */

/* ═══ POTLATCH SCENE — ceremony of generosity and prestige ═══
   Triggered: aft_show with any victory outcome (raid, trade, diplomacy).
   Stars: feast longhouse (huge, warm), copper shields (gleaming), council fire
   (blazing), trade goods (shimmering display), growing memorial pole. */
function PotlatchScene({G,sceneH}){
  const H=sceneH||220;
  const skyH=H*0.22;
  const groundTop=Math.floor(H*0.50);
  const groundH=H-groundTop;
  const isDecisive=G&&G.outcome==='DECISIVE_VICTORY';

/* ═══ SCENE DISPATCHER ═══ */
/* Routes to the appropriate phase scene using shared building blocks.
   Each scene is 320px tall, using the same visual language.
   Pass G and phase so scenes can react to game state (outcome, etc). */
function Scene({type,tall,G,phase,sceneH}){
  /* ── Step-specific featured SVG scenes ── */
  if(G&&G.step==='trv_trade_negotiate') return <TradeNegotiationScene G={G} sceneH={sceneH}/>;
  if(G&&G.step==='trv_diplo_council') return <DiplomacyCouncilScene G={G} sceneH={sceneH}/>;
  if(G&&G.step==='aft_show'){
    const isWin=G.outcome==='DECISIVE_VICTORY'||G.outcome==='VICTORY'||G.outcome==='TRADE_SUCCESS'||G.outcome==='DIPLOMACY_SUCCESS';
    if(isWin) return <PotlatchScene G={G} sceneH={sceneH}/>;
  }
  if(G&&G.step==='vil_dawn') return <VillageProvisionScene G={G} sceneH={sceneH}/>;
  /* ── Standard phase-based scenes ── */
  if(phase===1) return <TravelScene sceneH={sceneH} G={G}/>;
  if(phase===4) return <WithdrawalScene G={G} sceneH={sceneH}/>;
  if(phase===5) return <AftermathScene G={G} sceneH={sceneH}/>;
  if(phase===2) return <EncounterScene sceneH={sceneH}/>;
  if(phase===3) return <BattleScene G={G} sceneH={sceneH}/>;
  return <VillageScene sceneH={sceneH} G={G}/>;
}

/* ═══ HUD — contextual stats with deltas ═══ */
const PHASE_STATS={
  0:['morale','crew','canoe'],1:['morale','canoe','surprise'],
  2:['morale','crew','intimidation'],3:['morale','crew','canoe'],
  4:['morale','canoe','cargo'],5:['prestige','feud','cargo'],
};
const HOME_WATERS_STATS=['village','food','canoeReady'];
const STAT_TOOLTIPS={
  morale:'Crew will to fight',surprise:'Opening strike bonus',intimidation:'Break enemy will',
  prestige:'Standing among nations',feud:'Cedar Creek hatred',cargo:'Spoils for home',
  crew:'Warriors ready',canoe:'Hull condition',
  village:'Village season readiness',food:'Dried fish and oil stores',canoeReady:'War canoe preparation',pole:'Memorial pole carving',
};
function HudBar({G,phase,isFirstRaid}){
  const fearVal=cl(G.fear+(G.intimDelta<0?-G.intimDelta:0),0,100);
  const d=G.statDeltas||{};
  const stats={
    morale:{icon:'♥',label:'MORALE',val:G.morale,max:100,col:P.green,warn:v=>v<30,delta:d.morale},
    crew:{icon:'⚔',label:'CREW',val:G.crewAlive,max:G.crewSize,col:P.blue,warn:v=>v<G.crewSize*.5,delta:d.crew},
    canoe:{icon:'🛶',label:'CANOE',val:G.canoeCondition,max:100,col:P.blue,warn:v=>v<40,delta:d.canoe},
    cargo:{icon:'📦',label:'CARGO',val:G.cargo,max:G.cargoCapacity,col:P.gold,warn:()=>false,delta:d.cargo},
    prestige:{icon:'⭐',label:'PRESTIGE',val:G.prestige,max:500,col:P.gold,warn:()=>false,delta:d.prestige},
    feud:{icon:'🔥',label:'FEUD',val:G.feudEscalation,max:20,col:P.cedar,warn:v=>v>12,delta:d.feud},
    surprise:{icon:'👁',label:'SURPRISE',val:G.surpriseBonus,max:50,col:P.purple,warn:()=>false,delta:d.surprise},
    intimidation:{icon:'💀',label:'INTIM',val:G.intimidationBonus,max:30,col:P.red,warn:()=>false,delta:d.intimidation},
    village:{icon:'🏠',label:'VILLAGE',val:G.villageReadiness||0,max:100,col:P.green,warn:v=>v<30,delta:d.villageReadiness},
    food:{icon:'🐟',label:'FOOD',val:G.foodStores||0,max:100,col:P.gold,warn:v=>v<30,delta:d.foodStores},
    canoeReady:{icon:'🛶',label:'CANOE PREP',val:G.canoeReadiness||0,max:100,col:P.blue,warn:v=>v<30,delta:d.canoeReadiness},
    pole:{icon:'🪵',label:'POLE',val:G.poleProgress||0,max:100,col:P.purple,warn:()=>false,delta:d.poleProgress},
  };
  const isHomeWaters=G.step==='vil_dawn';
  const primary=isHomeWaters?HOME_WATERS_STATS:(PHASE_STATS[phase]||PHASE_STATS[0]);
  const all=['morale','crew','canoe','cargo','prestige','feud','village','food','canoeReady','pole'];  const secondary=all.filter(k=>!primary.includes(k));
  const renderDelta=(delta)=>{
    if(!delta||delta===0)return null;
    const col=delta>0?P.greenBright:P.redBright;
    return <span className="tl-delta" key={Math.random()} style={{color:col,marginLeft:3}}>{delta>0?'+':''}{delta}</span>;
  };
  return(
    <div style={{display:'flex',flexWrap:'wrap',gap:3,padding:'4px 8px',background:P.panel,borderBottom:`1px solid ${P.border}`}}>
      {primary.map(k=>{const s=stats[k];if(!s)return null;
        const danger=s.warn(s.val);const pct=s.max>0?cl(s.val/s.max*100,0,100):0;
        return(<div key={k} title={STAT_TOOLTIPS[k]||''} style={{flex:'1 1 80px',minWidth:72,padding:'3px 6px',background:P.panelHi,border:`1px solid ${danger?P.red:P.border}`,borderRadius:3,transition:'border-color .3s'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <span style={{fontSize:6,color:P.dim}}>{s.icon} {s.label}</span>
            <span style={{fontSize:10,color:danger?P.red:P.text,transition:'color .3s'}}>
              {typeof s.val==='number'?Math.round(s.val):s.val}
              {renderDelta(s.delta)}
            </span>
          </div>
          <div style={{height:3,background:'#1a1a40',borderRadius:2,marginTop:2,overflow:'hidden'}}>
            <div style={{height:'100%',width:pct+'%',background:danger?P.red:s.col,borderRadius:2,transition:'width .4s ease'}}/>
          </div>
          {isFirstRaid&&STAT_TOOLTIPS[k]&&<div style={{fontSize:5,color:P.dim+'90',marginTop:1}}>{STAT_TOOLTIPS[k]}</div>}
        </div>);
      })}
      {secondary.map(k=>{const s=stats[k];if(!s)return null;
        const danger=s.warn(s.val);
        return(<div key={k} title={STAT_TOOLTIPS[k]||''} style={{padding:'2px 5px',background:P.panelHi,border:`1px solid ${P.border}`,borderRadius:3,display:'flex',alignItems:'center',gap:3,transition:'all .3s'}}>
          <span style={{fontSize:6,color:P.dim}}>{s.icon}</span>
          <span style={{fontSize:8,color:danger?P.red:P.dim}}>{typeof s.val==='number'?Math.round(s.val):s.val}</span>
          {renderDelta(s.delta)}
        </div>);
      })}
    </div>
  );
}

/* ═══ BATTLE BOARD ═══ */
function BattleBoard({G}){
  if(!G.outcome||G.rounds.length===0)return null;
  const isWin=G.outcome.includes('VICTORY');
  const isLoss=G.outcome.includes('DEFEAT');
  const ocInfo=OUTCOME_LABEL[G.outcome];
  const tacLabel=(TACTIC_MODS[G.attackerTactic]||{}).label||'';
  return(
    <div style={{padding:'10px 12px',background:P.panel,borderBottom:`1px solid ${P.border}`}}>
      <div style={{fontSize:7,color:P.dim,letterSpacing:.5,marginBottom:8,textAlign:'center'}}>⚔  CLASH AT CEDAR CREEK — {tacLabel}</div>
      {G.rounds.map((r,i)=>{
        const total=r.atk+r.def;const atkPct=total>0?r.atk/total*100:50;
        const won=r.winner==='atk';const isTP=!!r.event;
        return(<div key={i} style={{padding:'7px 10px',marginBottom:5,background:P.panelHi,border:`1px solid ${isTP?P.goldDim+'60':P.border}`,borderRadius:4,animation:'tl-fadein .3s ease-out',animationDelay:(i*0.1)+'s',animationFillMode:'backwards'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:3}}>
            <span style={{fontSize:7,color:isTP?P.gold:P.dim}}>{isTP?'✦':'⚔'} R{i+1}: {r.name}</span>
            <span style={{fontSize:8,color:won?P.green:P.red,fontWeight:'bold'}}>{won?'▲ WON':'▼ LOST'}</span>
          </div>
          {isTP&&r.event.text&&<div style={{fontSize:7,color:P.gold,marginBottom:4,lineHeight:1.4}}>{r.event.text}</div>}
          <div style={{display:'flex',alignItems:'center',gap:4}}>
            <span style={{fontSize:7,color:P.text,width:30,textAlign:'right'}}>YOU {Math.round(r.atk)}</span>
            <div style={{flex:1,height:8,background:'#1a1a40',borderRadius:3,overflow:'hidden'}}>
              <div style={{height:'100%',width:atkPct+'%',background:won?P.green:P.red,borderRadius:2,transition:'width .5s ease'}}/>
            </div>
            <span style={{fontSize:7,color:P.dim,width:30}}>{Math.round(r.def)} DEF</span>

        border:`2px solid ${isWin?P.green+'80':isLoss?P.red+'80':P.dim+'80'}`,borderRadius:6,
        '--gc':isWin?P.green:isLoss?P.red:P.dim,
      }}>
        <div style={{fontSize:13,letterSpacing:3,color:isWin?P.gold:isLoss?P.red:P.dim}}>

/* ═══ IMPACT FRAME ═══ */
function ImpactFrame({frame,onDismiss}){
  const hasPlayed=useRef(false);
  useEffect(()=>{
    if(!frame||hasPlayed.current)return;
    hasPlayed.current=true;
    /* Play appropriate stinger */
    if(frame.type==='outcome'){
      const isWin=frame.outcome.includes('VICTORY');
      isWin?TL_Audio.stingerVictory():TL_Audio.stingerDefeat();
    }else if(frame.type==='fallen')TL_Audio.stingerFallen();
    else if(frame.type==='trait')TL_Audio.stingerTrait();
    else if(frame.type==='bloodfeud')TL_Audio.stingerBloodFeud();
    else if(frame.type==='phase_enter'){
      const ph=frame.phase;
      if(ph===1)TL_Audio.cueTravel();
      else if(ph===2)TL_Audio.cueEncounter();
      else if(ph===3)TL_Audio.cueBattle();
      else if(ph===4)TL_Audio.cueWithdrawal();
      else if(ph===5)TL_Audio.cueAftermath(!!frame.isWin);
      else TL_Audio.sfxContinue();
    }
  },[frame]);
  useEffect(()=>{if(!frame)hasPlayed.current=false;},[frame]);
  /* Keyboard dismiss */
  useEffect(()=>{
    if(!frame)return;
    const h=e=>{if(e.key==='Enter'||e.key===' '||e.key==='Escape'){e.preventDefault();onDismiss();}};
    document.addEventListener('keydown',h);return()=>document.removeEventListener('keydown',h);
  },[frame,onDismiss]);

  if(!frame)return null;
  let icon='',title='',body='',sub='',accentColor=P.gold,witness='';
  const isCeremony=frame.type==='outcome'||frame.type==='fallen'||frame.type==='trait'||frame.type==='bloodfeud';
  if(frame.type==='outcome'){
    const oc=OUTCOME_LABEL[frame.outcome];
    const isWin=frame.outcome.includes('VICTORY');
    icon=oc.icon;title=oc.text;accentColor=isWin?P.gold:P.red;
    body=OUTCOME_NARR[frame.outcome];
    sub=isWin?'The beach belongs to you.':'The tide carries you away.';
    if(isWin)witness='The village will gather to receive you.';
  }else if(frame.type==='fallen'){
    icon='☠';title='WARRIORS FALLEN';accentColor=P.red;
    body=frame.names.join(', ')+' — they will not return.';
    sub='Their names will be carved into the memorial post.';
    witness='The village will remember them.';
  }else if(frame.type==='trait'){
    icon='🏅';title='TRAIT WITNESSED';accentColor=P.gold;
    body=frame.traits.map(t=>TRAIT_DESC[t]||t).join(' ');
    sub='This changes who you are as a leader.';
    witness='The elders have seen. It is known.';
  }else if(frame.type==='bloodfeud'){
    icon='🔥';title='BLOOD FEUD DECLARED';accentColor=P.red;
    body='The feud with Cedar Creek has become generational. There is no forgetting.';
    sub='Humiliation and retaliation have crossed the point of no return.';
  }else if(frame.type==='phase_enter'){
    icon=PHASES[frame.phase]?.icon||'';
    title=frame.title||'';accentColor=PHASE_ACCENT[frame.phase]||P.gold;
    body=frame.subtitle||'';sub='';
    witness=frame.place?`Route focus: ${frame.place}`:'';
    if(frame.phase===5) sub=frame.isWin?'Witnesses gather before the canoe fully touches shore.':'The shoreline recognizes loss before anyone speaks.';
  }
  return(
    <div className="tl-impact-scrim" style={{
      position:'fixed',top:0,left:0,right:0,bottom:0,zIndex:1000,
      display:'flex',alignItems:'center',justifyContent:'center',
      background:P.scrim,cursor:'default',
    }}>
      <div className="tl-impact" onClick={onDismiss} style={{
        maxWidth:480,width:'90%',padding:frame.type==='phase_enter'?'20px 24px':'28px 24px',
        textAlign:'center',position:'relative',overflow:'hidden',
        background:P.panel,border:`2px solid ${accentColor}`,borderRadius:8,
        boxShadow:`0 0 50px ${accentColor}25, inset 0 0 40px ${accentColor}06`,cursor:'pointer',
      }}>
        {/* Decorative carved border lines (ceremony events) */}
        {isCeremony&&<>
          <div style={{position:'absolute',top:6,left:'8%',right:'8%',height:1,
            background:`linear-gradient(90deg,transparent,${accentColor}30,${accentColor}50,${accentColor}30,transparent)`}}/>
          <div style={{position:'absolute',bottom:6,left:'8%',right:'8%',height:1,
            background:`linear-gradient(90deg,transparent,${accentColor}20,${accentColor}35,${accentColor}20,transparent)`}}/>
        </>}
        <div style={{fontSize:frame.type==='phase_enter'?28:36,marginBottom:8}}>{icon}</div>
        <div style={{fontSize:frame.type==='phase_enter'?11:13,color:accentColor,letterSpacing:frame.type==='phase_enter'?2:3,marginBottom:8,fontFamily:font}}>{title}</div>
        {body&&<div style={{fontSize:8,color:P.text,lineHeight:1.8,fontFamily:font,marginBottom:sub?8:14}}>{body}</div>}
        {sub&&<div style={{fontSize:7,color:P.dim,lineHeight:1.6,fontFamily:font,marginBottom:witness?6:14,fontStyle:'italic'}}>{sub}</div>}
        {witness&&<div style={{fontSize:6,color:accentColor+'90',letterSpacing:.3,marginBottom:12,fontFamily:font}}>{witness}</div>}
        <div style={{fontSize:6,color:P.dim+'80',letterSpacing:.5}}>— CLICK / TAP TO CONTINUE —</div>
      </div>
    </div>
  );
}
