/* ─── §12  MAIN COMPONENT ────────────────────────────────────────────── */
function TidelinesApp(){
  const[G,setG]=useState(()=>{const sv=loadPersist();return initState(sv?{...sv,_fromSave:true}:{});});
  const logRef=useRef(null);
  const lastLoggedPhaseRef=useRef(null);
  useEffect(()=>{if(logRef.current)logRef.current.scrollTop=logRef.current.scrollHeight;},[G.log.length]);
  const act=useCallback((fn,...a)=>setG(p=>fn(p,...a)),[]);
  const onContinue=useCallback(()=>{TL_Audio.sfxContinue();setG(p=>{const fn=CONT[p.step];return fn?fn(p):p;});},[]);
  const onReset=useCallback(()=>setG(p=>initState({prestige:p.prestige,feudEscalation:p.feudEscalation,legacyEntries:p.legacyEntries,warTraits:p.warTraits,totalRaids:p.totalRaids,lastRun:p.lastRun})),[]);
  const onFullReset=useCallback(()=>{clearPersist();setG(initState());},[]);
  const toggleDebug=useCallback(()=>{TL_Audio.sfxToggle();setG(p=>({...p,showDebug:!p.showDebug}));},[]);
  const toggleLegacy=useCallback(()=>{TL_Audio.sfxToggle();setG(p=>({...p,showLegacy:!p.showLegacy}));},[]);
  const dismissImpact=useCallback(()=>{TL_Audio.sfxClick();setG(p=>({...p,impactFrame:null}));},[]);

  /* ── §12.05  Audio state ── */
  const[audioMuted,setAudioMuted]=useState(TL_Audio.isMuted());
  const toggleMute=useCallback(()=>{
    setAudioMuted(prev=>{const next=!prev;TL_Audio.setMute(next);if(!next)TL_Audio.sfxToggle();return next;});
  },[]);

  /* Initialize audio context on first user interaction */
  useEffect(()=>{
    const h=()=>{TL_Audio.ensureCtx();TL_Audio.resume();document.removeEventListener('click',h);document.removeEventListener('keydown',h);};
    document.addEventListener('click',h);document.addEventListener('keydown',h);
    return()=>{document.removeEventListener('click',h);document.removeEventListener('keydown',h);};
  },[]);

  /* ── §12.1  Play Mode / Console Mode ── */
  const[playMode,setPlayMode]=useState(false);
  const[sidebarOpen,setSidebarOpen]=useState(false);
  const[logExpanded,setLogExpanded]=useState(false);
  const[battleSummaryOpen,setBattleSummaryOpen]=useState(true);
  const[aftermathSummaryOpen,setAftermathSummaryOpen]=useState(true);
  const appRef=useRef(null);
  const[sceneH,setSceneH]=useState(220);

  /* ── §12.05a  Orientation & mobile detection ── */
  const[isPortrait,setIsPortrait]=useState(()=>window.innerWidth<window.innerHeight);
  const[isMobile,setIsMobile]=useState(()=>window.innerWidth<740);
  const[orientDismissed,setOrientDismissed]=useState(false);
  useEffect(()=>{
    const h=()=>{setIsPortrait(window.innerWidth<window.innerHeight);setIsMobile(window.innerWidth<740);};
    window.addEventListener('resize',h);return()=>window.removeEventListener('resize',h);
  },[]);
  const showOrientHint=playMode&&isMobile&&!orientDismissed;

  const togglePlayMode=useCallback(()=>{
    setPlayMode(prev=>{
      const next=!prev;
      TL_Audio.ensureCtx();TL_Audio.resume();
      if(next)TL_Audio.stingerPlayMode();else TL_Audio.sfxClose();
      try{
        if(next){const el=document.documentElement;(el.requestFullscreen||el.webkitRequestFullscreen||function(){}).call(el);}
        else if(document.fullscreenElement||document.webkitFullscreenElement)(document.exitFullscreen||document.webkitExitFullscreen||function(){}).call(document);
      }catch(e){}
      if(!next){setSidebarOpen(false);setLogExpanded(false);setOrientDismissed(false);}
      return next;
    });
  },[]);

  /* Detect fullscreen exit to update UI (play mode stays active as fallback) */
  const[isFullscreen,setIsFullscreen]=useState(false);
  useEffect(()=>{
    const h=()=>setIsFullscreen(!!document.fullscreenElement||!!document.webkitFullscreenElement);
    document.addEventListener('fullscreenchange',h);document.addEventListener('webkitfullscreenchange',h);
    return()=>{document.removeEventListener('fullscreenchange',h);document.removeEventListener('webkitfullscreenchange',h);};
  },[]);

  /* Keyboard: F=toggle play mode, Esc=exit play mode */
  useEffect(()=>{
    const h=(e)=>{
      if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA')return;
      if((e.key==='f'||e.key==='F')&&!e.ctrlKey&&!e.metaKey&&!e.altKey){e.preventDefault();togglePlayMode();}
      if(e.key==='Escape'&&playMode&&!document.fullscreenElement){setPlayMode(false);setSidebarOpen(false);}
    };
    document.addEventListener('keydown',h);
    return()=>document.removeEventListener('keydown',h);
  },[playMode,togglePlayMode]);

  /* Dynamic scene height in play mode — mobile-aware */
  useEffect(()=>{
    if(!playMode){setSceneH(220);return;}
    const calc=()=>{
      const vh=window.innerHeight;
      const vw=window.innerWidth;
      const isLand=vw>vh;
      const isMob=vw<740||(isLand&&vh<500);
      if(isMob&&isLand) setSceneH(cl(Math.round(vh*0.33),120,210));
      else if(isMob) setSceneH(cl(Math.round(vh*0.4),180,320));
      else setSceneH(cl(Math.round(vh*0.35),200,420));
    };
    calc();window.addEventListener('resize',calc);
    return()=>window.removeEventListener('resize',calc);
  },[playMode]);

  /* Body overflow lock in play mode */
  useEffect(()=>{
    document.body.style.overflow=playMode?'hidden':'';
    return()=>{document.body.style.overflow='';};
  },[playMode]);

  /* ── §12.2  Phase audio cues ── */
  const prevPhaseRef=useRef(null);
  useEffect(()=>{
    const phase=phaseIdx(G.step);
    if(prevPhaseRef.current===null){prevPhaseRef.current=phase;return;}
    if(phase!==prevPhaseRef.current){
      prevPhaseRef.current=phase;
      /* Phase-specific ambient cue (only when not covered by impact frame) */
      if(!G.impactFrame){
        if(phase===0)TL_Audio.cueVillage();
        else if(phase===5){
          const isW=G.outcome==='DECISIVE_VICTORY'||G.outcome==='VICTORY';
          TL_Audio.cueAftermath(isW);
        }
      }
    }
    /* Stat delta micro-SFX */
    const d=G.statDeltas||{};
    const hasUp=Object.values(d).some(v=>v>0);
    const hasDown=Object.values(d).some(v=>v<0);
    if(hasUp)TL_Audio.sfxStatUp();
    if(hasDown)setTimeout(()=>TL_Audio.sfxStatDown(),hasUp?150:0);
  },[G.step,G.statDeltas]);

  /* ── §12.3  Keyboard navigation for command cards + continue ── */
  const cmdAreaRef=useRef(null);
  useEffect(()=>{
    const h=(e)=>{
      if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA')return;
      if(G.impactFrame)return; /* Impact frame has its own keyboard handler */
      if(!cmdAreaRef.current)return;
      const btns=[...cmdAreaRef.current.querySelectorAll('.tl-cmd,.tl-action')];
      if(btns.length===0)return;
      const focused=btns.findIndex(b=>b===document.activeElement);
      const hasBtnFocus=focused>=0;

      /* Arrow keys always work; WASD only when a command button is focused */
      const isArrow=e.key.startsWith('Arrow');
      if(e.key==='ArrowDown'||(hasBtnFocus&&(e.key==='s'||e.key==='S'))){
        if(isArrow)e.preventDefault();
        const next=focused<0?0:Math.min(focused+1,btns.length-1);
        btns[next].focus();TL_Audio.sfxClick();
      }else if(e.key==='ArrowUp'||(hasBtnFocus&&(e.key==='w'||e.key==='W'))){
        if(isArrow)e.preventDefault();
        const next=focused<0?0:Math.max(focused-1,0);
        btns[next].focus();TL_Audio.sfxClick();
      }else if(e.key==='ArrowRight'||(hasBtnFocus&&(e.key==='d'||e.key==='D'))){
        if(isArrow)e.preventDefault();
        const next=focused<0?0:Math.min(focused+1,btns.length-1);
        btns[next].focus();TL_Audio.sfxClick();
      }else if(e.key==='ArrowLeft'||(hasBtnFocus&&(e.key==='a'||e.key==='A'))){
        if(isArrow)e.preventDefault();
        const next=focused<0?0:Math.max(focused-1,0);
        btns[next].focus();TL_Audio.sfxClick();
      }else if((e.key==='Enter'||e.key===' ')&&hasBtnFocus){
        e.preventDefault();btns[focused].click();
      }else if((e.key==='Enter'||e.key===' ')&&!hasBtnFocus){
        /* No button focused — trigger continue if available, or focus first command */
        const contBtn=cmdAreaRef.current.querySelector('.tl-action');
        if(contBtn){e.preventDefault();contBtn.click();}
        else if(btns.length){e.preventDefault();btns[0].focus();TL_Audio.sfxClick();}
      }else if(e.key==='m'||e.key==='M'){
        if(!e.ctrlKey&&!e.metaKey&&!e.altKey)toggleMute();
      }
    };
    document.addEventListener('keydown',h);
    return()=>document.removeEventListener('keydown',h);
  },[G.impactFrame,toggleMute]);

  const phase=phaseIdx(G.step);
  const hasCont=!!CONT[G.step];
  const accent=PHASE_ACCENT[phase]||P.gold;
  const phaseInfo=PHASES[phase]||PHASES[0];
  const showBattle=G.rounds.length>0&&G.outcome&&phase>=3&&phase<5;
  const showAftermath=phase===5;
  const isFirstRaid=G.totalRaids===0;
  const hint=isFirstRaid?HINTS[G.step]:null;
  const playContext=playContextLabel({playMode,isMobile,isPortrait});
  const feedbackHref=buildFeedbackHref({
    playContext,
    phaseLabel:phaseProgressLabel(phase),
    raidNumber:G.totalRaids+1,
    outcome:OUTCOME_LABEL[G.outcome]?.text||'',
    strongestMoment:strongestMomentLabel(G),
    memoryLine:coastMemoryLine(G),
  });
  const openFeedback=useCallback(()=>{
    logAlphaEvent('feedback_opened',{phase:G.step,outcome:G.outcome||'',context:playContext,build:BUILD.version});
  },[G.step,G.outcome,playContext]);

  useEffect(()=>{
    if(phase===3) setBattleSummaryOpen(true);
    else if(phase===4) setBattleSummaryOpen(false);
    if(phase===5) setAftermathSummaryOpen(false);
  },[phase,G.step]);

  useEffect(()=>{
    if(lastLoggedPhaseRef.current===G.step)return;
    lastLoggedPhaseRef.current=G.step;
    logAlphaEvent('step_viewed',{step:G.step,phase:phaseInfo.label,raid:G.totalRaids+1});
  },[G.step,phaseInfo.label,G.totalRaids]);

  return(
    <div ref={appRef} className={playMode?'tl-playmode':''} style={{fontFamily:font,fontSize:10,lineHeight:1.6,color:P.text,background:P.bg,minHeight:'100vh'}}>
      <style>{INJCSS}</style>

      <ImpactFrame frame={G.impactFrame} onDismiss={dismissImpact}/>
      {showOrientHint&&<OrientationHint isPortrait={isPortrait} onDismiss={()=>setOrientDismissed(true)}/>}

      <div className="tl-screen">

        {/* ═══ TOP BAR ═══ */}
        <div className="tl-topbar" style={{
          display:'flex',alignItems:'center',justifyContent:'space-between',
          padding:'5px 12px',background:P.panel,borderBottom:`2px solid ${P.gold}`,
        }}>
          <div className="tl-topbar-main" style={{display:'flex',alignItems:'center',gap:8}}>
            <span className="tl-topbar-title" style={{fontSize:12,color:P.gold,letterSpacing:2}}>⛵ TIDELINES</span>
            <span className="tl-mobile-hide" style={{fontSize:6,color:P.dim,letterSpacing:.5}}>Cedar, Sea & Legacy</span>
            <span className="tl-alpha-chip tl-mobile-hide">{BUILD.label}</span>
            <span className="tl-context-chip">{BUILD.version}</span>
          </div>
          <div className="tl-topbar-actions" style={{display:'flex',alignItems:'center',gap:8}}>
            <span className="tl-context-chip" title="Current play context">{playContext}</span>
            {G.totalRaids>0&&<span className="tl-mobile-hide" style={{fontSize:6,color:P.dim}}>Raid #{G.totalRaids+1}</span>}
            {G.warTraits.length>0&&<span className="tl-mobile-hide" style={{fontSize:6,color:P.goldDim}}>{G.warTraits.length} trait{G.warTraits.length>1?'s':''}</span>}
            <FeedbackButton href={feedbackHref} onOpen={openFeedback} label="Feedback"/>
            <span onClick={toggleLegacy} style={{fontSize:7,color:P.goldDim,cursor:'pointer',userSelect:'none'}} title="Legacy Log">📜</span>
            <span onClick={toggleDebug} style={{fontSize:6,color:P.dim+'80',cursor:'pointer',userSelect:'none'}} title="Debug">⚙</span>
            <span className="tl-mute-btn" onClick={toggleMute} style={{color:audioMuted?P.dim:P.dimHi}} title={audioMuted?'Unmute (M)':'Mute (M)'}>{audioMuted?'🔇':'🔊'}</span>
            {playMode&&<span className="tl-sidebar-toggle" onClick={()=>{setSidebarOpen(v=>{const n=!v;n?TL_Audio.sfxOpen():TL_Audio.sfxClose();return n;});}} style={{fontSize:8,color:sidebarOpen?P.gold:P.dimHi,letterSpacing:1}} title="Toggle Crew Panel">☰</span>}
            <span className="tl-play-btn" onClick={togglePlayMode} style={{fontSize:7,color:playMode?P.gold:P.dimHi}} title={playMode?'Exit Play Mode (F)':'Enter Play Mode (F)'}>{playMode?(isFullscreen?'⊠ EXIT':'⊠ EXIT'):'\u25a3 PLAY'}</span>
          </div>
        </div>

        {/* ═══ MAIN STAGE ═══ */}
        <div className="tl-stage" style={{display:'flex',flexDirection:'column',background:PHASE_BG[phase]||P.bg,minHeight:0}}>

          {/* Phase header */}
          <div className="tl-phase-head" style={{
            display:'flex',alignItems:'center',justifyContent:'center',gap:8,
            padding:'5px 12px',position:'relative',overflow:'hidden',
            background:`linear-gradient(90deg,${accent}15,transparent 35%,transparent 65%,${accent}15)`,
            borderBottom:`1px solid ${accent}30`,
          }}>
            <div style={{position:'absolute',bottom:0,left:0,right:0,height:2,background:accent,transformOrigin:'left',animation:'tl-phase-sweep .6s ease-out',opacity:.4}}/>
            <span className="tl-phase-icon" style={{fontSize:12}}>{phaseInfo.icon}</span>
            <div>
              <div className="tl-phase-title" style={{fontSize:10,color:accent,letterSpacing:1.5}}>{phaseInfo.label.toUpperCase()}</div>
              <div className="tl-phase-tagline" style={{fontSize:6,color:P.dim,letterSpacing:.3}}>{phaseInfo.tagline}</div>
              <div className="tl-phase-meta" style={{fontSize:5,color:P.goldDim,letterSpacing:.5,marginTop:1}}>{phaseProgressLabel(phase)} · {BUILD.label}</div>
            </div>
          </div>

          <RouteStrip phase={phase}/>
          <HudBar G={G} phase={phase} isFirstRaid={isFirstRaid}/>
          <div className="tl-worldbar">
            <CampaignBanner G={G} phase={phase}/>
            <LocationCard phase={phase}/>
            <CoastalChart phase={phase}/>
          </div>
          {isFirstRaid&&<FirstRunBriefing phase={phase} playContext={playContext}/>} 

          <div style={{flex:'0 0 auto',minHeight:playMode?sceneH:220}}>
            <Scene type={G.scene} tall={true} G={G} phase={phase} sceneH={playMode?sceneH:220}/>
          </div>

          {showBattle&&<div style={{background:P.panel,borderBottom:`1px solid ${P.border}`}}>
            <div onClick={()=>{setBattleSummaryOpen(v=>{const n=!v;n?TL_Audio.sfxOpen():TL_Audio.sfxClose();return n;});}} style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:8,padding:'6px 12px',cursor:'pointer',userSelect:'none'}}>
              <div style={{fontSize:7,color:P.dim,letterSpacing:.5}}>⚔ BATTLE SUMMARY {phase>=4?'— compact so the scene stays visible':''}</div>
              <div style={{fontSize:6,color:battleSummaryOpen?P.gold:P.dim}}>{battleSummaryOpen?'▾ OPEN':'▸ EXPAND'}</div>
            </div>
            {battleSummaryOpen&&<div className="tl-scroll" style={playMode?{maxHeight:180,overflowY:'auto'}:{}}><BattleBoard G={G}/></div>}
          </div>}
          {showAftermath&&<div style={{background:P.panel,borderBottom:`1px solid ${P.border}`}}>
            <div onClick={()=>{setAftermathSummaryOpen(v=>{const n=!v;n?TL_Audio.sfxOpen():TL_Audio.sfxClose();return n;});}} style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:8,padding:'6px 12px',cursor:'pointer',userSelect:'none'}}>
              <div style={{fontSize:7,color:P.dim,letterSpacing:.5}}>🏔 AFTERMATH SUMMARY — compact by default so the homecoming scene stays readable</div>
              <div style={{fontSize:6,color:aftermathSummaryOpen?P.gold:P.dim}}>{aftermathSummaryOpen?'▾ OPEN':'▸ EXPAND'}</div>
            </div>
            {aftermathSummaryOpen&&<div className="tl-scroll" style={playMode?{maxHeight:260,overflowY:'auto'}:{}}><AftermathSummary G={G} feedbackHref={feedbackHref} onFeedback={openFeedback} playContext={playContext}/></div>}
          </div>}

          {/* Narrative log */}
          <div className="tl-scroll tl-narrlog" ref={logRef} style={{
            flex:playMode&&!logExpanded?'0 0 auto':'1 1 80px',
            minHeight:playMode&&!logExpanded?0:60,
            maxHeight:playMode&&!logExpanded?50:140,
            overflowY:'auto',
            padding:playMode&&!logExpanded?'3px 12px':'6px 12px',
            background:P.darkBg,borderTop:`1px solid ${P.border}`,
            position:'relative',
          }}>
            {playMode&&!logExpanded
              ? G.log.slice(-3).map((l,i,a)=><NarrEntry key={G.log.length-3+i} line={l} isLast={i===a.length-1}/>)
              : G.log.map((l,i)=><NarrEntry key={i} line={l} isLast={i===G.log.length-1}/>)
            }
            {playMode&&G.log.length>3&&<div onClick={()=>setLogExpanded(v=>!v)} style={{
              position:'absolute',top:1,right:6,fontSize:5,color:P.dim,cursor:'pointer',userSelect:'none',
              background:P.darkBg,padding:'1px 4px',borderRadius:2,zIndex:2,
            }}>{logExpanded?'▾ less':'▸ '+G.log.length+' lines'}</div>}
          </div>
        </div>

        {/* ═══ SIDEBAR DRAWER BACKDROP (play mode) ═══ */}
        {playMode&&sidebarOpen&&<div onClick={()=>setSidebarOpen(false)} style={{
          position:'fixed',inset:0,background:'rgba(0,0,0,.35)',zIndex:190,backdropFilter:'blur(2px)',
        }}/>}

        {/* ═══ SIDEBAR ═══ */}
        <div className={`tl-sidebar${playMode?' tl-sidebar-play':''}${playMode&&sidebarOpen?' tl-sidebar-open':''}`} style={{display:'flex',flexDirection:'column',background:P.panel,minHeight:0}}>
          {playMode&&<>
            <div className="tl-sheet-handle" style={{marginTop:6}}/>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'4px 10px 6px',borderBottom:`1px solid ${P.gold}20`,background:P.panelHi}}>
              <span style={{fontSize:7,color:P.gold,letterSpacing:.5}}>⚓ CREW PANEL</span>
              <span onClick={()=>setSidebarOpen(false)} style={{fontSize:9,color:P.dim,cursor:'pointer',padding:'0 4px'}}>✕</span>
            </div>
          </>}

          {G.step==='vil_intel'&&G.lastRun&&(
            <div style={{padding:'8px 10px',borderBottom:`1px solid ${P.border}`,background:P.panelHi}}>
              <div style={{color:P.goldDim,fontSize:6,marginBottom:3,letterSpacing:.5}}>LAST EXPEDITION</div>
              <div style={{fontSize:7}}>
                {OUTCOME_LABEL[G.lastRun.outcome]?.icon} {OUTCOME_LABEL[G.lastRun.outcome]?.text}
                {G.lastRun.killed>0&&<span style={{color:P.red}}> · ☠{G.lastRun.killed}</span>}
                {G.lastRun.wounded>0&&<span style={{color:P.dim}}> · ⚔{G.lastRun.wounded}</span>}
              </div>
              <div style={{fontSize:6,color:P.dim,marginTop:2}}>{G.lastRun.prestige} prestige · {G.lastRun.feud}</div>
              {G.lastRun.named_dead?.length>0&&<div style={{fontSize:6,color:P.red,marginTop:2}}>Fallen: {G.lastRun.named_dead.join(', ')}</div>}
            </div>
          )}

          <div style={{padding:'8px 10px',borderBottom:`1px solid ${P.border}`,background:P.panelHi}}>
            <div style={{fontSize:6,color:P.goldDim,letterSpacing:.5,marginBottom:4}}>COASTAL CONTEXT</div>
            <div style={{fontSize:7,color:P.gold,marginBottom:2}}>{campaignSeason(G)}</div>
            <div style={{fontSize:6,color:P.dim,marginBottom:4}}>{routeStatusText(phase,G)}</div>
            <div style={{fontSize:6,color:P.dimHi,lineHeight:1.55}}>{coastMemoryLine(G)}</div>
          </div>

          <div style={{padding:'8px 10px',borderBottom:`1px solid ${P.border}`}}>
            <div style={{fontSize:6,color:P.goldDim,letterSpacing:.5,marginBottom:4}}>ALPHA BUILD</div>
            <div style={{fontSize:7,color:P.gold,marginBottom:2}}>{BUILD.label} · {BUILD.version}</div>
            <div style={{fontSize:6,color:P.dim,marginBottom:4}}>{BUILD.build} · {playContext}</div>
            <FeedbackButton href={feedbackHref} onOpen={openFeedback} label="Send feedback"/>
          </div>

          {/* Crew roster */}
          <div style={{padding:'8px 10px',borderBottom:`1px solid ${P.border}`}}>
            <div style={{fontSize:6,color:P.dim,letterSpacing:.5,marginBottom:5}}>⚔ WAR PARTY</div>
            {G.namedCrew.map(c=>(
              <div key={c.id} style={{display:'flex',alignItems:'center',gap:5,marginBottom:3,transition:'opacity .3s',opacity:!c.alive?.5:1}}>
                <span style={{fontSize:8,width:10,textAlign:'center',color:!c.alive?P.red:c.wounded?P.dim:P.green}}>
                  {!c.alive?'☠':c.wounded?'⚔':'●'}
                </span>
                <span style={{fontSize:7,color:!c.alive?P.redDim:P.text,textDecoration:!c.alive?'line-through':'none'}}>
                  {c.name}
                </span>
                <span style={{fontSize:6,color:P.dim}}>{c.role}</span>
              </div>
            ))}
            <div style={{fontSize:6,color:P.dim,marginTop:3}}>{G.crewAlive} of {G.crewSize} warriors ready</div>
          </div>

          {G.warTraits.length>0&&(
            <div style={{padding:'8px 10px',borderBottom:`1px solid ${P.border}`}}>
              <div style={{fontSize:6,color:P.goldDim,letterSpacing:.5,marginBottom:4}}>🏅 WAR TRAITS</div>
              <div style={{display:'flex',gap:4,flexWrap:'wrap'}}>
                {G.warTraits.map(t=>(
                  <span key={t} title={TRAIT_DESC[t]} style={{fontSize:6,padding:'2px 5px',background:P.panelHi,border:`1px solid ${P.goldDim}30`,borderRadius:3,color:P.gold,cursor:'help'}}>
                    {t.replace(/_/g,' ')}
                  </span>
                ))}
              </div>
            </div>
          )}

          {phase>=2&&phase<=3&&(
            <div style={{padding:'8px 10px',borderBottom:`1px solid ${P.border}`}}>
              <div style={{fontSize:6,color:P.red,letterSpacing:.5,marginBottom:4}}>🏴 CEDAR CREEK</div>
              <div style={{fontSize:7,color:P.dim}}>Warriors: ~{G.defender.crewSize}</div>
              <div style={{fontSize:7,color:P.dim}}>Resolve: {G.defender.morale}</div>
              {G.intimResult&&<div style={{fontSize:7,color:G.intimDelta>0?P.green:P.red}}>Intimidated: {G.intimResult}</div>}
            </div>
          )}

          {G.showLegacy&&(
            <div style={{flex:'1 1 0',overflowY:'auto',padding:'8px 10px'}} className="tl-scroll">
              <div style={{fontSize:7,color:P.gold,letterSpacing:.5,marginBottom:6}}>📜 LEGACY LOG</div>
              {G.legacyEntries.length===0
                ?<span style={{color:P.dim,fontSize:7}}>No entries yet. Complete a raid to record history.</span>
                :G.legacyEntries.map((e,i)=>(
                  <div key={i} style={{marginBottom:8,paddingBottom:8,borderBottom:i<G.legacyEntries.length-1?`1px solid ${P.border}20`:'none'}}>
                    <div style={{color:P.goldDim,fontSize:6,marginBottom:2}}>Expedition {i+1}</div>
                    <div style={{fontSize:7,lineHeight:1.6,color:P.text}}>{e}</div>
                  </div>
                ))
              }
            </div>
          )}

          {G.showDebug&&(
            <div style={{flex:'1 1 0',overflowY:'auto',padding:'6px 8px',background:P.debugBg,fontSize:6,color:P.green,lineHeight:1.8}} className="tl-scroll">
              <span style={{color:P.gold}}>Step:</span> {G.step} · Raid #{G.totalRaids+1}<br/>
              <span style={{color:P.gold}}>Forces:</span> ATK mor {G.morale} · DEF mor {G.defender.morale} · Crew {G.crewAlive}/{G.crewSize}<br/>
              <span style={{color:P.gold}}>Mods:</span> Intel {G.intelQuality} · Surp {G.surpriseBonus} · Stealth {G.stealthBonus} · Intim {G.intimidationBonus}<br/>
              <span style={{color:P.gold}}>Intim:</span> {G.intimScore} vs {G.resolveScore} Δ{G.intimDelta} {G.intimResult||'—'}<br/>
              <span style={{color:P.gold}}>Combat:</span> {G.attackerTactic} · {G.outcome||'—'} · ×{G.outcomeRatio.toFixed(2)}<br/>
              {G.rounds.map((r,i)=><span key={i}>R{i+1}: {r.atk.toFixed(1)}/{r.def.toFixed(1)}{r.event?` ✦${r.event.id}`:''}<br/></span>)}
              <span style={{color:P.gold}}>After:</span> K{G.crewKilled} W{G.crewWounded} Cargo {G.cargo} PΔ{G.prestigeChange} Feud {G.feudEscalation}<br/>
              <span style={{color:P.gold}}>Persist:</span> {loadPersist()?'saved':'empty'} · Traits: {G.warTraits.join(',')||'—'}
            </div>
          )}

          {!G.showDebug&&!G.showLegacy&&<div style={{flex:'1 1 0'}}/>}

          <div style={{padding:'6px 10px',textAlign:'center',borderTop:`1px solid ${P.border}`,fontSize:5,color:P.dim+'50'}}>TIDELINES {BUILD.version} · {BUILD.label} · {BUILD.build}</div>
        </div>

        {/* ═══ COMMAND AREA ═══ */}
        <div ref={cmdAreaRef} className="tl-cmdarea" style={{
          padding:'6px 12px 8px',background:P.panel,
          borderTop:`2px solid ${accent}`,
        }}>

          {/* ─ Village: Intel ─ */}
          {G.step==='vil_intel'&&<>
            <div style={{fontSize:7,color:P.dim,marginBottom:5,letterSpacing:.3}}>
              {isFirstRaid?'First choice: learn what waits at Cedar Creek before you commit the crossing.':'How will you gather intelligence before departure?'}
            </div>
            <Hint text={hint}/>
            <div className="tl-cmd-grid" style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(200px,1fr))',gap:6}}>
              <CommandCard icon="🔭" title="Send Scouts"
                flavor="Eyes on the target. Your best warriors slip through the forest to count heads and canoes."
                effect="ACCURATE intel · +5 Surprise · +3 Morale"
                risk="15% detection — they may see your scouts"
                archetype="The careful strategist"
                onClick={()=>act(pickIntel,'scouts')}/>
              <CommandCard icon="🗣" title="Ask Traders"
                flavor="Coastal traders pass through every village. Their information is free — and possibly stale."
                effect="VAGUE intel · possible alliance info"
                archetype="The pragmatic opportunist"
                onClick={()=>act(pickIntel,'traders')}/>
              <CommandCard icon="🔮" title="Read the Omens"
                flavor="Your spiritual advisor studies the fire, the tide, the flight of ravens."
                effect="VAGUE intel · +5 Morale"
                archetype="The spiritual leader"
                onClick={()=>act(pickIntel,'omens')}/>
            </div>
          </>}

          {/* ─ Village: Prep ─ */}
          {G.step==='vil_prep'&&<>
            <div style={{fontSize:7,color:P.dim,marginBottom:5,letterSpacing:.3}}>
              {isFirstRaid?'Final village preparation: choose the advantage you want to carry onto the water.':'Final preparations before departure:'}
            </div>
            <Hint text={hint}/>
            <div className="tl-cmd-grid" style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(200px,1fr))',gap:6}}>
              <CommandCard icon="🎨" title="War Paint & Crests"
                flavor="Eagle and Killer Whale on every shield. The enemy sees your lineage before your weapons."
                effect="+10 Intimidation · +5 Morale"
                archetype="Break their will before the fight"
                onClick={()=>act(pickPrep,'war_paint')}/>
              <CommandCard icon="🧺" title="Load Extra Supplies"
                flavor="Dried fish, water, repair materials. The canoe sits deeper — ready for a long campaign."
                effect="+10 Cargo Capacity · +10 Canoe Condition"
                archetype="Prepared for anything"
                onClick={()=>act(pickPrep,'extra_supplies')}/>
              <CommandCard icon="🙏" title="Spiritual Blessing"
                flavor="Cedar on the fire. The smoke rises. The spirits walk with you across the water."
                effect="+8 Morale · +5 Surprise"
                archetype="Favored by unseen forces"
                onClick={()=>act(pickPrep,'blessing')}/>
            </div>
          </>}

          {/* ─ Travel: Arrival ─ */}
          {G.step==='trv_arrival'&&<>
            <div style={{fontSize:7,color:P.dim,marginBottom:5,letterSpacing:.3}}>
              {isFirstRaid?'The crossing is underway. Choose when your canoe reaches Cedar Creek’s shore.':'When will you arrive at Cedar Creek?'}
            </div>
            <Hint text={hint}/>
            <div className="tl-cmd-grid" style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(200px,1fr))',gap:6}}>
              <CommandCard icon="🌅" title="Dawn Arrival"
                flavor="Paddle through the night. Strike as the first grey light touches the sky."
                effect="+15 Surprise"
                archetype="Reliable — the proven approach"
                onClick={()=>act(pickArrival,'dawn')}/>
              <CommandCard icon="🌙" title="Night Approach"
                flavor="Total darkness. Phosphorescence the only light. Maximum stealth — maximum risk."
                effect="+25 Surprise"
                risk="20% canoe damage from unseen rocks"
                archetype="High risk, highest reward"
                onClick={()=>act(pickArrival,'night')}/>
              <CommandCard icon="🌫" title="Morning Fog"
                flavor="The fog is a gift from the sea. Your canoe slides through it like a spirit."
                effect="+20 Surprise · +5 Stealth"
                archetype="Patient and adaptable"
                onClick={()=>act(pickArrival,'fog')}/>
            </div>
          </>}

          {/* ─ Travel: Formation ─ */}
          {G.step==='trv_form'&&<>
            <div style={{fontSize:7,color:P.dim,marginBottom:5,letterSpacing:.3}}>
              {isFirstRaid?'Choose the feeling of your approach: remain hidden, or be seen and feared.':'How does your force approach?'}
            </div>
            <Hint text={hint}/>
            <div className="tl-cmd-grid" style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(200px,1fr))',gap:6}}>
              <CommandCard icon="🤫" title="Tight & Quiet"
                flavor="One canoe, paddles in perfect unison. Not a sound until the gravel."
                effect="+10 Stealth · −5 Intimidation"
                archetype="Strike before they know you're there"
                onClick={()=>act(pickFormation,'stealth')}/>
              <CommandCard icon="⚔" title="Maximum Intimidation"
                flavor="War crests visible across the water. Let them see what comes."
                effect="+15 Intimidation · −10 Stealth"
                archetype="Let fear do the work"
                onClick={()=>act(pickFormation,'intimidating')}/>
            </div>
          </>}

          {/* ─ Encounter: Tactic ─ */}
          {G.step==='enc_tactic'&&<>
            <div style={{fontSize:7,color:P.red,marginBottom:5,letterSpacing:.3}}>
              {isFirstRaid?'⚔ Battle order: this choice most directly shapes damage, risk, and the story you bring home.':'⚔ Issue your battle order:'}
            </div>
            <Hint text={hint}/>
            <div className="tl-cmd-grid" style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(200px,1fr))',gap:6}}>
              <CommandCard icon="⚔" title="Overwhelming Assault"
                flavor="Everything forward. Maximum violence. End this quickly."
                effect="ATK ×1.3 — strongest strike"
                risk="Losses ×1.5 if the line breaks"
                archetype="The fearless war chief"
                onClick={()=>act(pickTactic,'overwhelming')}/>
              <CommandCard icon="🛡" title="Measured Push"
                flavor="Steady advance. Shield wall. Disciplined pressure."
                effect="ATK ×1.1 · Losses ×1.0 — balanced"
                archetype="The experienced commander"
                onClick={()=>act(pickTactic,'measured')}/>
              <CommandCard icon="👁" title="Feint & Probe"
                flavor="Test the line. Find the weakness. Strike only where it matters."
                effect="ATK ×0.8 · Losses ×0.6 — conservative"
                archetype="The calculating strategist"
                onClick={()=>act(pickTactic,'feint')}/>
              <CommandCard icon="🕊" title="Negotiate Under Arms"
                flavor='"We came for what is owed." Weapons visible. Words first.'
                effect="ATK ×0.4 · Losses ×0.1 — minimal combat"
                archetype="The diplomat with a sword"
                onClick={()=>act(pickTactic,'negotiate')}/>
            </div>
          </>}

          {/* ─ Withdrawal ─ */}
          {G.step==='wth_choose'&&<>
            <div style={{fontSize:7,color:P.dim,marginBottom:5,letterSpacing:.3}}>
              {isFirstRaid?'The raid is not finished. Decide what kind of return journey your crew must survive.':'How will you withdraw?'}
            </div>
            <Hint text={hint}/>
            <div className="tl-cmd-grid" style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(200px,1fr))',gap:6}}>
              <CommandCard icon="💨" title="Quick Load & Go"
                flavor="Speed over greed. Load what you can and push off before they regroup."
                effect="Keep 60% of spoils · Safest option"
                archetype="Live to raid again"
                onClick={()=>act(pickWithdrawal,'quick')}/>
              <CommandCard icon="📦" title="Take Everything"
                flavor="Strip the fish racks. Cedar bark. Dentalium. Every shell."
                effect="All spoils"
                risk="30% counterattack — they may charge"
                archetype="Maximum gain, real danger"
                onClick={()=>act(pickWithdrawal,'thorough')}/>
              <CommandCard icon="🦅" title="Plant Your Crest"
                flavor="Drive a carved Eagle post into their gravel. Your mark, facing their longhouse."
                effect="80% spoils · +10 Prestige · +3 Feud"
                archetype="Legacy over resources"
                onClick={()=>act(pickWithdrawal,'mark')}/>
            </div>
          </>}

          {/* ─ Aftermath ─ */}
          {G.step==='aft_show'&&(
            <div style={{display:'flex',gap:8,flexWrap:'wrap',justifyContent:'center',alignItems:'center'}}>
              <ContinueBtn label="🔄  Launch Next Raid" onClick={onReset}/>
              <FeedbackButton href={feedbackHref} onOpen={openFeedback} label="Send feedback"/>
              <button className="tl-action" style={{
                display:'inline-block',background:P.panelHi,color:P.dim,border:`1px solid ${P.border}`,
                borderRadius:4,padding:'10px 18px',fontFamily:font,fontSize:8,cursor:'pointer',
              }} onClick={onFullReset}>✖  New Game</button>
            </div>
          )}

          {/* ─ Continue ─ */}
          {hasCont&&<div style={{textAlign:'center',marginTop:8}}>
            <ContinueBtn onClick={onContinue} label={
              G.step==='vil_done'?'⛵  Set Sail':
              G.step==='trv_done'?'⚔  Make Contact':
              G.step==='enc_done'||G.step==='enc_fled'?'🔥  Begin':
              G.step==='res_done'?'🛶  Withdraw':
              G.step==='wth_retreat'?'📜  Return Home':
              '▸  Continue'
            }/>
          </div>}
        </div>

      </div>
    </div>
  );
}

/* ─── §13  MOUNT ──────────────────────────────────────────────────────── */
const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(TidelinesApp));
</script>
</body>
</html>
